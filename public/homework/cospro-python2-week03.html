<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코딩쏙 숙제</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root {
    --navy: #000000;
    --navy2: #0a0a0a;
    --navy3: #000000;
    --orange: #f43f5e;
    --orange2: #fb7185;
    --og: rgba(244,63,94,0.18);
    --white: #ffffff;
    --bg: #f4f5f7;
    --g50: #f9fafb; --g100: #f3f4f6; --g200: #e5e7eb; --g300: #d1d5db;
    --g400: #9ca3af; --g500: #6b7280; --g600: #4b5563; --g700: #374151;
    --text: #1e293b;
    --green: #10b981; --gbg: #d1fae5;
    --red: #ef4444;
    --font: 'Noto Sans KR', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: var(--font);
    background: var(--navy3);
    color: var(--text);
    line-height: 1.6;
  }

  /* ===== COVER ===== */
  .cover {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000000;
    z-index: 200;
    transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
  }

  .cover.hidden { opacity: 0; transform: scale(0.97); pointer-events: none; }

  .cover-orb {
    position: absolute; border-radius: 50%; filter: blur(100px); pointer-events: none;
  }
  .c-o1 { width: 400px; height: 400px; background: var(--orange); top: -100px; right: -80px; opacity: 0.18; }
  .c-o2 { width: 300px; height: 300px; background: #f97316; bottom: 5%; left: -60px; opacity: 0.1; }

  .cover-pat {
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  .cover-box {
    position: relative; z-index: 1; max-width: 480px; width: 100%; padding: 0 32px; text-align: center;
  }

  .cover-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(224,120,48,0.12); border: 1px solid rgba(224,120,48,0.2);
    color: var(--orange2); font-size: 11px; font-weight: 700;
    padding: 6px 16px; border-radius: 100px; letter-spacing: 2px; margin-bottom: 28px;
  }

  .cover-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); animation: pulse 2s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

  .cover h1 {
    font-size: 48px; font-weight: 900; color: var(--white);
    line-height: 1.15; letter-spacing: -1.5px; margin-bottom: 10px;
  }
  .cover h1 .ac { background: linear-gradient(135deg, var(--orange), var(--orange2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

  .cover-sub { font-size: 15px; color: rgba(255,255,255,0.35); margin-bottom: 44px; }

  .cover-stats { display: flex; gap: 14px; justify-content: center; margin-bottom: 40px; }

  .cover-stat {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px; padding: 16px 24px; text-align: center; min-width: 100px;
  }

  .cs-n { font-size: 26px; font-weight: 800; color: var(--white); font-family: var(--mono); }
  .cs-l { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 2px; }

  .cover-form { max-width: 360px; margin: 0 auto 32px; text-align: left; }

  .inp-w { position: relative; margin-bottom: 14px; }

  .inp-lb {
    position: absolute; top: 14px; left: 18px;
    font-size: 12px; color: rgba(255,255,255,0.25); font-weight: 500;
    pointer-events: none; transition: all 0.2s;
  }

  .name-input {
    width: 100%; padding: 32px 18px 12px;
    border: 1.5px solid rgba(255,255,255,0.08); border-radius: 14px;
    background: rgba(255,255,255,0.03); color: var(--white);
    font-size: 20px; font-weight: 700; font-family: var(--font); outline: none;
    transition: all 0.25s;
  }
  .name-input:focus { border-color: var(--orange); background: rgba(224,120,48,0.04); box-shadow: 0 0 0 4px var(--og); }
  .name-input:focus + .inp-lb, .name-input:not(:placeholder-shown) + .inp-lb { font-size: 10px; top: 10px; color: var(--orange2); }
  .name-input::placeholder { color: transparent; }

  .start-btn {
    width: 100%; padding: 18px;
    background: linear-gradient(135deg, var(--orange), var(--orange2));
    color: var(--white); font-size: 17px; font-weight: 800;
    border: none; border-radius: 14px; cursor: pointer;
    font-family: var(--font); transition: all 0.2s; position: relative; overflow: hidden;
  }
  .start-btn::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.12)); pointer-events:none; }
  .start-btn:hover { box-shadow: 0 8px 32px var(--og); transform: translateY(-1px); }
  .start-btn:active { transform: scale(0.98); }

  .cover-hints {
    display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
    font-size: 12px; color: rgba(255,255,255,0.25);
  }
  .cover-hints span::before { content: '•'; color: var(--orange); margin-right: 6px; font-weight: 700; }

  /* ===== APP SHELL ===== */
  .app { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--navy3); }
  .app.on { display: flex; }

  /* Header */
  .hd {
    flex-shrink: 0; background: var(--navy); padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06); z-index: 10;
  }

  .hd-left { display: flex; align-items: center; gap: 14px; }
  .hd-logo { font-weight: 900; font-size: 18px; color: var(--orange); }
  .hd-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.1); }
  .hd-info { font-size: 13px; color: rgba(255,255,255,0.4); }
  .hd-info b { color: rgba(255,255,255,0.7); font-weight: 600; }

  .hd-right { display: flex; align-items: center; gap: 20px; }
  .hd-save { font-size: 12px; color: var(--green); font-weight: 600; }

  .hd-pg { display: flex; align-items: center; gap: 6px; }
  .hd-pg-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.1); cursor: pointer; transition: all 0.3s;
  }
  .hd-pg-dot.on { background: var(--orange); width: 22px; border-radius: 4px; }
  .hd-pg-dot.done { background: var(--green); }
  .hd-pg-label {
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    color: rgba(255,255,255,0.4); margin-left: 8px;
  }

  /* ===== MAIN AREA ===== */
  .main {
    flex: 1; position: relative; overflow: hidden;
  }

  .page {
    position: absolute; inset: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 20px 24px;
    opacity: 0;
    transform: translateX(80px);
    transition: all 0.5s var(--ease);
    pointer-events: none;
  }

  .page.active {
    opacity: 1; transform: translateX(0); pointer-events: auto;
  }

  .page.exit-left {
    opacity: 0; transform: translateX(-80px);
  }

  /* ===== PROBLEM CARD ===== */
  .card {
    background: var(--white);
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    border: 1px solid var(--g200);
    transition: box-shadow 0.3s, border-color 0.3s;
    min-height: 0;
  }

  .card:hover { box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
  .card.done { border-color: var(--green); }

  .card-top {
    background: linear-gradient(135deg, var(--navy), var(--navy2));
    padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    position: relative; overflow: hidden;
  }

  .card-top::after {
    content: ''; position: absolute; top: -15px; right: -15px;
    width: 70px; height: 70px; border-radius: 50%;
    background: rgba(255,255,255,0.03);
  }

  .card-top-l { display: flex; align-items: center; gap: 10px; z-index: 1; }

  .card-qn {
    font-family: var(--mono); font-size: 20px; font-weight: 700;
    color: var(--orange); line-height: 1;
  }

  .card-badge {
    font-size: 10px; font-weight: 700; padding: 3px 10px;
    border-radius: 6px; letter-spacing: 0.3px;
  }
  .b-out { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
  .b-fill { background: rgba(244,63,94,0.2); color: #fda4af; }
  .b-fix { background: rgba(239,68,68,0.2); color: #fca5a5; }
  .b-comp { background: rgba(16,185,129,0.2); color: #6ee7b7; }

  .card-pts {
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    color: rgba(255,255,255,0.35); z-index: 1;
  }

  .card-body {
    flex: 1; overflow-y: auto; padding: 16px 18px 18px;
    display: flex; flex-direction: column;
  }

  .card-q {
    font-size: 13.5px; font-weight: 600; line-height: 1.7;
    color: var(--navy); margin-bottom: 14px;
    padding-left: 12px; border-left: 3px solid var(--orange);
  }

  /* Code */
  .cw {
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    border: 1px solid var(--g200); margin-bottom: 14px; flex-shrink: 0;
  }

  .cb {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 14px; background: var(--navy);
  }

  .cb-dots { display: flex; gap: 4px; }
  .cb-dots i { width: 8px; height: 8px; border-radius: 50%; display: block; }
  .cb-dots i:nth-child(1) { background: #ef4444; }
  .cb-dots i:nth-child(2) { background: #f59e0b; }
  .cb-dots i:nth-child(3) { background: #22c55e; }

  .cb-lang { font-family: var(--mono); font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.35); }

  .cc {
    background: #fafbfd; padding: 10px 0;
    font-family: var(--mono); font-size: 11.5px; line-height: 1.85; overflow-x: auto;
  }

  .cl { display: flex; padding: 0 12px; }
  .cl.hl { background: #fef3c7; }
  .ln { width: 20px; text-align: right; color: #cbd5e1; font-size: 9px; margin-right: 10px; user-select: none; flex-shrink: 0; }
  .lc { flex: 1; white-space: pre; }

  .s-kw { color: #e11d48; font-weight: 600; }
  .s-str { color: #d97706; }
  .s-num { color: #dc2626; }
  .s-cm { color: #94a3b8; font-style: italic; }
  .s-bl { background: rgba(224,120,48,0.1); color: var(--orange); padding: 1px 8px; border-radius: 3px; font-weight: 700; border: 1px dashed var(--orange); }

  /* Choices */
  .choices { display: flex; flex-direction: column; gap: 6px; flex: 1; }

  .ch {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border: 1.5px solid var(--g200); border-radius: 10px;
    background: var(--white); cursor: pointer; font-family: var(--font);
    font-size: 12px; color: var(--text); transition: all 0.2s; text-align: left;
    -webkit-appearance: none;
  }
  .ch:active { transform: scale(0.98); }
  .ch.sel { border-color: var(--navy); background: #fff1f2; color: var(--navy); font-weight: 600; }

  .ch-m {
    width: 26px; height: 26px; border: 2px solid var(--g300); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 11px; flex-shrink: 0; color: var(--g400); transition: all 0.2s;
  }
  .ch.sel .ch-m { background: var(--navy); color: var(--white); border-color: var(--navy); }
  .ch-t { font-family: var(--mono); font-size: 11.5px; line-height: 1.4; }

  /* Write area */
  .wa {
    border: 2px dashed var(--g300); border-radius: 12px; overflow: hidden;
    transition: all 0.3s; flex: 1; display: flex; flex-direction: column;
  }
  .wa:focus-within { border-color: var(--orange); border-style: solid; box-shadow: 0 0 0 3px var(--og); }

  .wa-h {
    background: var(--g50); color: var(--g500); font-size: 10px; font-weight: 700;
    padding: 8px 14px; border-bottom: 1px solid var(--g200);
    display: flex; align-items: center; gap: 5px; letter-spacing: 0.5px; flex-shrink: 0;
  }
  .wa-ic { color: var(--orange); font-weight: 800; }

  .ta, .ce {
    width: 100%; flex: 1; min-height: 50px;
    padding: 12px 14px; color: var(--text);
    background: var(--white); border: none; outline: none; resize: none;
  }

  .ta { font-family: var(--font); font-size: 13.5px; line-height: 1.7; }
  .ta::placeholder, .ce::placeholder { color: var(--g300); }

  .ce { font-family: var(--mono); font-size: 12px; line-height: 1.8; tab-size: 4; }

  /* Checklist */
  .checklist { display: flex; flex-direction: column; gap: 8px; flex: 1; }

  .ck-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border: 1.5px solid var(--g200); border-radius: 12px;
    background: var(--white); cursor: pointer; transition: all 0.25s;
    user-select: none;
  }
  .ck-item:hover { border-color: var(--g300); background: #fafbfd; }
  .ck-item.checked { border-color: var(--green); background: #f0fdf4; }

  .ck-box {
    width: 28px; height: 28px; border: 2.5px solid var(--g300); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.25s; font-size: 16px; color: transparent;
  }
  .ck-item.checked .ck-box {
    background: var(--green); border-color: var(--green); color: var(--white);
  }

  .ck-label { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.5; flex: 1; }
  .ck-item.checked .ck-label { color: var(--green); text-decoration: line-through; text-decoration-color: rgba(16,185,129,0.3); }

  /* ===== FOOTER ===== */
  .foot {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 14px 32px; background: var(--navy);
    border-top: 1px solid rgba(255,255,255,0.06); z-index: 10;
  }

  .f-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 24px; border: 1.5px solid rgba(255,255,255,0.12); border-radius: 12px;
    background: transparent; color: rgba(255,255,255,0.5);
    font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: var(--font); transition: all 0.2s;
  }
  .f-btn:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.8); }
  .f-btn:disabled { opacity: 0.2; pointer-events: none; }
  .f-btn:active { transform: scale(0.97); }

  .f-btn.next { background: var(--orange); border-color: var(--orange); color: var(--white); }
  .f-btn.next:hover { background: var(--orange2); border-color: var(--orange2); }

  .f-center { display: flex; align-items: center; gap: 12px; }

  .f-page {
    font-family: var(--mono); font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,0.6);
  }
  .f-page b { color: var(--orange); }

  .f-submit {
    padding: 10px 28px;
    background: linear-gradient(135deg, var(--orange), var(--orange2));
    color: var(--white); border: none; border-radius: 12px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: var(--font); transition: all 0.2s; position: relative; overflow: hidden;
  }
  .f-submit::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,transparent 50%,rgba(255,255,255,0.1)); pointer-events:none; }
  .f-submit:hover { box-shadow: 0 4px 20px var(--og); }
  .f-submit:active { transform: scale(0.97); }

  .f-reset {
    padding: 10px 16px; background: transparent;
    color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; font-size: 12px; cursor: pointer; font-family: var(--font);
  }
  .f-reset:hover { color: var(--red); border-color: rgba(239,68,68,0.3); }

  /* ===== MODAL ===== */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(15,31,51,0.88); backdrop-filter: blur(12px);
    z-index: 300; align-items: center; justify-content: center; padding: 24px;
  }
  .modal-bg.on { display: flex; }

  .modal {
    background: var(--white); border-radius: 24px; padding: 44px 36px 36px;
    max-width: 400px; width: 100%; text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.3); animation: mIn 0.4s var(--ease);
  }
  @keyframes mIn { from{transform:translateY(30px) scale(.95);opacity:0} to{transform:none;opacity:1} }

  .m-ic {
    width: 64px; height: 64px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px; font-size: 28px; font-weight: 900;
  }
  .m-ic.ok { background: var(--gbg); color: var(--green); }
  .m-ic.gd { background: #dbeafe; color: var(--navy); }
  .m-ic.go { background: #fff7ed; color: var(--orange); }

  .modal h2 { font-size: 22px; font-weight: 900; color: var(--navy); margin-bottom: 6px; }
  .modal p { color: var(--g500); font-size: 14px; margin-bottom: 24px; line-height: 1.6; }

  .m-sts { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; }
  .m-st { flex: 1; background: var(--g50); border: 1px solid var(--g200); border-radius: 14px; padding: 14px 0; }
  .m-st .n { font-family: var(--mono); font-size: 28px; font-weight: 800; color: var(--navy); }
  .m-st .l { font-size: 11px; color: var(--g400); font-weight: 600; }

  .m-cl {
    width: 100%; padding: 14px; background: var(--navy); color: var(--white);
    border: none; border-radius: 14px; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: var(--font);
  }
  .m-cl:active { background: var(--navy2); }

  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

  /* Responsive: smaller screens show 2 cols */
  @media (max-width: 1000px) {
    .page { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px; }
    .hd { padding: 12px 20px; }
    .foot { padding: 12px 20px; }
  }

  @media print {
    body { background: white; }
    .cover, .hd, .foot { display: none; }
    .app { display: flex !important; position: static; }
    .main { position: static; overflow: visible; }
    .page { position: static; opacity: 1; transform: none; pointer-events: auto; grid-template-columns: repeat(2, 1fr); }
    .card { break-inside: avoid; box-shadow: none; border: 1px solid var(--g300); }
  }
</style>
</head>
<body>

<!-- ===== COVER ===== -->
<div class="cover" id="cover">
  <div class="cover-orb c-o1"></div>
  <div class="cover-orb c-o2"></div>
  <div class="cover-pat"></div>
  <div class="cover-box">
    <div class="cover-chip"><div class="cover-dot"></div>CODING SSOK</div>
    <h1>이번 주 <span class="ac">숙제</span></h1>
    <p class="cover-sub">COS PRO 2급 Python — 3주차</p>
    <div class="cover-stats">
      <div class="cover-stat"><div class="cs-n" id="cCnt">12</div><div class="cs-l">문제</div></div>
      <div class="cover-stat"><div class="cs-n" id="cDue">3/20</div><div class="cs-l">마감일</div></div>
      <div class="cover-stat"><div class="cs-n">30</div><div class="cs-l">분 예상</div></div>
    </div>
    <div class="cover-form">
      <div class="inp-w">
        <input type="text" class="name-input" id="studentName" placeholder=" " autocomplete="off">
        <label class="inp-lb">이름을 입력하세요</label>
      </div>
      <button class="start-btn" onclick="go()">숙제 시작하기</button>
    </div>
    <div class="cover-hints">
      <span>자동 저장</span><span>이어서 풀기</span><span>화살표 이동</span><span>빈칸 OK</span>
    </div>
  </div>
</div>

<!-- ===== APP ===== -->
<div class="app" id="app">
  <div class="hd">
    <div class="hd-left">
      <div class="hd-logo">코딩쏙</div>
      <div class="hd-sep"></div>
      <div class="hd-info">3주차 숙제 · <b id="hName"></b></div>
    </div>
    <div class="hd-right">
      <div class="hd-save" id="hSave">● 저장됨</div>
      <div class="hd-pg" id="pgDots"></div>
      <div class="hd-pg-label" id="pgLabel">1 / 3</div>
    </div>
  </div>

  <div class="main" id="main"></div>

  <div class="foot">
    <button class="f-btn" id="bP" onclick="mv(-1)"><span>←</span> 이전</button>
    <div class="f-center">
      <button class="f-reset" onclick="rst()">초기화</button>
      <div class="f-page"><b id="fCur">1</b> / <span id="fTot">3</span></div>
      <button class="f-submit" onclick="sub()">제출하기</button>
    </div>
    <button class="f-btn next" id="bN" onclick="mv(1)">다음 <span>→</span></button>
  </div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-bg" id="mbg">
  <div class="modal">
    <div class="m-ic" id="mI">✓</div>
    <h2 id="mT"></h2>
    <p id="mM"></p>
    <div class="m-sts">
      <div class="m-st"><div class="n" id="mA">0</div><div class="l">작성</div></div>
      <div class="m-st"><div class="n" id="mTot">0</div><div class="l">전체</div></div>
    </div>
    <button class="m-cl" onclick="closeModal()">확인</button>
  </div>
</div>

<script>
const H = {
  id:"week03", due:"3/20",
  p:[
    {n:1,t:"output",pt:10,q:"다음 코드의 실행 결과를 쓰시오.",c:'x = 10\ny = 3\nprint(x + y)\nprint(x * y)',hl:[3,4],at:"text"},
    {n:2,t:"fill",pt:10,q:"다음 코드의 빈칸에 들어갈 알맞은 코드를 고르시오.",c:'def add(a, b):\n    ___①___\n\nresult = add(3, 5)\nprint(result)  # 8',hl:[2],ch:["return a + b","print(a + b)","a + b","sum(a, b)"],at:"choice"},
    {n:3,t:"output",pt:10,q:"다음 코드를 실행했을 때 출력 결과를 쓰시오.",c:'for i in range(1, 6):\n    if i % 2 == 0:\n        print(i, end=" ")',hl:[2,3],at:"text"},
    {n:4,t:"fix",pt:10,q:"다음 코드는 1부터 10까지의 합을 구하려 합니다. 오류를 찾아 수정하시오.",c:'total = 0\nfor i in range(1, 10):\n    total += i\nprint(total)  # 기대: 55',hl:[2],at:"text"},
    {n:5,t:"complete",pt:10,q:"리스트에서 최댓값을 찾는 함수를 완성하시오.",c:'def find_max(nums):\n    # 여기에 코드를 작성하세요\n\nprint(find_max([3, 7, 2, 9, 4]))  # 9',hl:[2],at:"code"},
    {n:6,t:"output",pt:10,q:"다음 코드의 실행 결과를 쓰시오.",c:'a = [1, 2, 3]\nb = a\nb.append(4)\nprint(a)\nprint(b)',hl:[2,3,4,5],at:"text"},
    {n:7,t:"fill",pt:10,q:'딕셔너리에서 키 "name"의 값을 안전하게 가져오는 코드를 고르시오.',c:'d = {"age": 20, "city": "서울"}\nresult = ___①___\nprint(result)  # 없음',hl:[2],ch:['d.get("name", "없음")','d["name"]','d.find("name")','d.default("name")'],at:"choice"},
    {n:8,t:"output",pt:10,q:"다음 코드의 실행 결과를 쓰시오.",c:'def calc(a, b):\n    return a + b, a * b\n\nx, y = calc(4, 5)\nprint(x)\nprint(y)',hl:[2,4,5,6],at:"text"},
    {n:9,t:"fix",pt:10,q:"다음 코드에서 오류를 찾아 수정 방법을 쓰시오.",c:'data = []\ndata[0] = 10\nprint(data)',hl:[2],at:"text"},
    {n:10,t:"complete",pt:10,q:"문자열에서 모음(a,e,i,o,u)의 개수를 세는 함수를 완성하시오.",c:'def count_vowels(s):\n    # 여기에 코드를 작성하세요\n\nprint(count_vowels("hello"))  # 2\nprint(count_vowels("python"))  # 1',hl:[2],at:"code"},
    {n:11,t:"checklist",pt:10,q:"이번 주 학습 체크리스트를 완료하세요.",at:"check",items:["타자연습 150타 이상 달성하기","교재 3주차 전체 읽기","연습문제 5번까지 풀기","오답노트 작성하기"]},
    {n:12,t:"checklist",pt:10,q:"코딩 실습 체크리스트를 완료하세요.",at:"check",items:["VS Code에서 Python 파일 생성하기","for 반복문 예제 3개 직접 작성하기","함수 정의 및 호출 실습하기","코드 실행 후 결과 캡처하기"]}
  ]
};

const PER = 4; // 페이지당 문제 수
let cur = 0;
const SK = `hw_${H.id}`;
const totalPages = Math.ceil(H.p.length / PER);

const ld = () => { try { return JSON.parse(localStorage.getItem(SK))||{}; } catch { return {}; } };

function sv() {
  const d = { name: document.getElementById('studentName').value, ans: {}, ts: Date.now() };
  H.p.forEach(p => {
    if (p.at==='check'&&p.items) {
      const checks = {};
      document.querySelectorAll(`.ck-item[data-q="${p.n}"]`).forEach(el => { checks[el.dataset.idx] = el.classList.contains('checked'); });
      d.ans[p.n] = JSON.stringify(checks);
    }
    else if (p.at==='choice') { const s=document.querySelector(`.ch[data-q="${p.n}"].sel`); d.ans[p.n]=s?s.dataset.v:''; }
    else if (p.at==='code') { const e=document.getElementById(`c${p.n}`); d.ans[p.n]=e?e.value:''; }
    else { const e=document.getElementById(`a${p.n}`); d.ans[p.n]=e?e.value:''; }
  });
  localStorage.setItem(SK, JSON.stringify(d));
  document.getElementById('hSave').textContent = '● 저장됨';
  updDots();

  // postMessage bridge: notify parent of progress
  if (window.parent !== window) {
    let cnt = 0;
    H.p.forEach(p => { if (getVal(p)) cnt++; });
    window.parent.postMessage({ type: 'hw-progress', answered: cnt, total: H.p.length }, '*');
  }
}

function syn(code, hls) {
  const hs = new Set(hls||[]);
  return code.split('\n').map((l,i) => {
    const n=i+1;
    let e=l.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    e=e.replace(/\b(def|return|for|while|if|elif|else|in|not|and|or|import|from|class|try|except|finally|with|as|pass|break|continue|yield|lambda|True|False|None|print|range|len|int|str|float|list|dict|set|tuple|sorted|map|filter|type|isinstance)\b/g,'<span class="s-kw">$1</span>');
    e=e.replace(/(["'])(?:(?!\1).)*\1/g,'<span class="s-str">$&</span>');
    e=e.replace(/(#.*)$/,'<span class="s-cm">$1</span>');
    e=e.replace(/\b(\d+)\b/g,'<span class="s-num">$1</span>');
    e=e.replace(/___①___/g,'<span class="s-bl"> ① </span>');
    e=e.replace(/___②___/g,'<span class="s-bl"> ② </span>');
    return `<div class="cl${hs.has(n)?' hl':''}"><span class="ln">${n}</span><span class="lc">${e}</span></div>`;
  }).join('');
}

const TL={output:['출력 예측','b-out'],fill:['빈칸 채우기','b-fill'],fix:['오류 수정','b-fix'],complete:['코드 완성','b-comp'],checklist:['체크리스트','b-comp']};
const MK=['가','나','다','라'];

function render() {
  const main = document.getElementById('main');
  const saved = ld();
  let html = '';

  for (let pg = 0; pg < totalPages; pg++) {
    const start = pg * PER;
    const items = H.p.slice(start, start + PER);
    const act = pg === cur ? ' active' : '';

    html += `<div class="page${act}" data-pg="${pg}">`;
    items.forEach(p => {
      const [tl,bc] = TL[p.t]||['문제','b-out'];
      const sv = saved.ans ? (saved.ans[p.n]||'') : '';

      let cd = '';
      if (p.c) cd = `<div class="cw"><div class="cb"><div class="cb-dots"><i></i><i></i><i></i></div><span class="cb-lang">Python</span></div><div class="cc">${syn(p.c,p.hl)}</div></div>`;

      let aw = '';
      if (p.at==='check'&&p.items) {
        // Checklist type: each item is a checkbox
        const savedChecks = sv ? (typeof sv === 'string' ? JSON.parse(sv || '{}') : sv) : {};
        aw = `<div class="checklist" data-q="${p.n}">${p.items.map((x,j) => {
          const ck = savedChecks[j] ? ' checked' : '';
          return `<div class="ck-item${ck}" data-q="${p.n}" data-idx="${j}" onclick="toggleCk(this)"><div class="ck-box">✓</div><div class="ck-label">${x.replace(/</g,'&lt;')}</div></div>`;
        }).join('')}</div>`;
      } else if (p.at==='choice'&&p.ch) {
        aw = `<div class="choices">${p.ch.map((x,j) => {
          const sl = sv===x?' sel':'';
          return `<button class="ch${sl}" data-q="${p.n}" data-v="${x.replace(/"/g,'&quot;')}" onclick="sc(this)"><span class="ch-m">${MK[j]}</span><span class="ch-t">${x.replace(/</g,'&lt;')}</span></button>`;
        }).join('')}</div>`;
      } else if (p.at==='code') {
        aw = `<div class="wa"><div class="wa-h"><span class="wa-ic">▶</span> 코드 작성</div><textarea class="ce" id="c${p.n}" placeholder="여기에 코드를 작성하세요..." oninput="sv()">${sv}</textarea></div>`;
      } else {
        aw = `<div class="wa"><div class="wa-h"><span class="wa-ic">✎</span> 정답 입력</div><textarea class="ta" id="a${p.n}" rows="2" placeholder="답을 입력하세요..." oninput="sv()">${sv}</textarea></div>`;
      }

      html += `<div class="card" id="card${p.n}"><div class="card-top"><div class="card-top-l"><span class="card-qn">Q${p.n}</span><span class="card-badge ${bc}">${tl}</span></div><span class="card-pts">${p.pt}점</span></div><div class="card-body"><div class="card-q">${p.q}</div>${cd}${aw}</div></div>`;
    });
    html += '</div>';
  }

  main.innerHTML = html;

  // Page dots
  const dots = document.getElementById('pgDots');
  dots.innerHTML = Array.from({length: totalPages}, (_,i) =>
    `<div class="hd-pg-dot${i===cur?' on':''}" onclick="jmp(${i})"></div>`
  ).join('');

  updDots();
  updBtn();
  updLabel();
}

function updDots() {
  // Card done states
  H.p.forEach(p => {
    let v = '';
    if (p.at==='check'&&p.items) {
      const els = document.querySelectorAll(`.ck-item[data-q="${p.n}"].checked`);
      v = els.length === p.items.length ? 'done' : (els.length > 0 ? 'partial' : '');
    }
    else if (p.at==='choice') { const s=document.querySelector(`.ch[data-q="${p.n}"].sel`); v=s?s.dataset.v:''; }
    else if (p.at==='code') { const e=document.getElementById(`c${p.n}`); v=e?e.value.trim():''; }
    else { const e=document.getElementById(`a${p.n}`); v=e?e.value.trim():''; }
    const card = document.getElementById(`card${p.n}`);
    if (card) card.classList.toggle('done', !!v);
  });

  // Page dots
  const dots = document.querySelectorAll('.hd-pg-dot');
  dots.forEach((d,i) => {
    d.classList.toggle('on', i===cur);
    // Check if all problems in this page are done
    const start = i * PER;
    const items = H.p.slice(start, start + PER);
    const allDone = items.every(p => {
      let v = '';
      if (p.at==='check'&&p.items) {
        const els = document.querySelectorAll(`.ck-item[data-q="${p.n}"].checked`);
        v = els.length === p.items.length ? 'done' : '';
      }
      else if (p.at==='choice') { const s=document.querySelector(`.ch[data-q="${p.n}"].sel`); v=s?s.dataset.v:''; }
      else if (p.at==='code') { const e=document.getElementById(`c${p.n}`); v=e?e.value.trim():''; }
      else { const e=document.getElementById(`a${p.n}`); v=e?e.value.trim():''; }
      return !!v;
    });
    d.classList.toggle('done', allDone && i!==cur);
  });
}

function updBtn() {
  document.getElementById('bP').disabled = cur===0;
  document.getElementById('bN').disabled = cur===totalPages-1;
}

function updLabel() {
  document.getElementById('fCur').textContent = cur + 1;
  document.getElementById('fTot').textContent = totalPages;
  document.getElementById('pgLabel').textContent = `${cur+1} / ${totalPages}`;
}

function mv(d) {
  const nx = cur + d;
  if (nx < 0 || nx >= totalPages) return;
  const pages = document.querySelectorAll('.page');

  pages[cur].classList.remove('active');
  pages[cur].style.transform = d>0 ? 'translateX(-80px)' : 'translateX(80px)';
  pages[cur].style.opacity = '0';

  pages[nx].style.transform = d>0 ? 'translateX(80px)' : 'translateX(-80px)';
  pages[nx].style.opacity = '0';

  requestAnimationFrame(() => {
    pages[nx].classList.add('active');
    pages[nx].style.transform = '';
    pages[nx].style.opacity = '';
    setTimeout(() => {
      document.querySelectorAll('.page:not(.active)').forEach(p => { p.style.transform=''; p.style.opacity=''; });
    }, 500);
  });

  cur = nx;
  updDots(); updBtn(); updLabel(); sv();
}

function jmp(i) {
  if (i === cur) return;
  const d = i > cur ? 1 : -1;
  const pages = document.querySelectorAll('.page');

  pages[cur].classList.remove('active');
  pages[cur].style.transform = d>0 ? 'translateX(-80px)' : 'translateX(80px)';
  pages[cur].style.opacity = '0';

  pages[i].style.transform = d>0 ? 'translateX(80px)' : 'translateX(-80px)';
  pages[i].style.opacity = '0';

  requestAnimationFrame(() => {
    pages[i].classList.add('active');
    pages[i].style.transform = '';
    pages[i].style.opacity = '';
    setTimeout(() => {
      document.querySelectorAll('.page:not(.active)').forEach(p => { p.style.transform=''; p.style.opacity=''; });
    }, 500);
  });

  cur = i;
  updDots(); updBtn(); updLabel();
}

function sc(b) {
  document.querySelectorAll(`.ch[data-q="${b.dataset.q}"]`).forEach(x => x.classList.remove('sel'));
  b.classList.add('sel'); sv();
}

function toggleCk(el) {
  el.classList.toggle('checked'); sv();
}

function go() {
  const nm = document.getElementById('studentName').value.trim();
  if (!nm) {
    const inp = document.getElementById('studentName');
    inp.focus(); inp.style.borderColor='#ef4444';
    inp.style.animation='shake 0.4s ease'; setTimeout(()=>inp.style.animation='',400);
    return;
  }
  document.getElementById('cover').classList.add('hidden');
  document.getElementById('app').classList.add('on');
  document.getElementById('hName').textContent = nm;
  cur = 0;
  render(); sv();
}

function rst() {
  if (!confirm('모든 답안을 초기화할까요?')) return;
  localStorage.removeItem(SK); render();
}

function closeModal() {
  document.getElementById('mbg').classList.remove('on');
  // postMessage bridge: notify parent that modal was closed
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'hw-close' }, '*');
  }
}

function getVal(p) {
  if (p.at==='check'&&p.items) {
    const els = document.querySelectorAll(`.ck-item[data-q="${p.n}"].checked`);
    return els.length === p.items.length ? 'all_checked' : (els.length > 0 ? `${els.length}/${p.items.length}` : '');
  }
  if (p.at==='choice') { const s=document.querySelector(`.ch[data-q="${p.n}"].sel`); return s?s.dataset.v:''; }
  if (p.at==='code') { return document.getElementById(`c${p.n}`)?.value.trim()||''; }
  return document.getElementById(`a${p.n}`)?.value.trim()||'';
}

function sub() {
  let ans = 0;
  H.p.forEach(p => { if (getVal(p)) ans++; });
  const tot=H.p.length, pct=Math.round(ans/tot*100);
  document.getElementById('mA').textContent=ans;
  document.getElementById('mTot').textContent=tot;
  const ic=document.getElementById('mI');
  if (pct===100) { ic.className='m-ic ok'; ic.textContent='✓'; document.getElementById('mT').textContent='완벽해요!'; document.getElementById('mM').textContent='모든 문제를 다 풀었어요!'; }
  else if (pct>=70) { ic.className='m-ic gd'; ic.textContent='!'; document.getElementById('mT').textContent='잘했어요!'; document.getElementById('mM').textContent=`${tot-ans}문제만 더 풀면 완성!`; }
  else { ic.className='m-ic go'; ic.textContent='→'; document.getElementById('mT').textContent='조금 더 힘내봐요!'; document.getElementById('mM').textContent=`아직 ${tot-ans}문제가 남았어요.`; }
  document.getElementById('mbg').classList.add('on'); sv();

  // postMessage bridge: send answers to parent
  if (window.parent !== window) {
    const answers = {};
    H.p.forEach(p => {
      if (p.at==='check'&&p.items) {
        const checks = {};
        document.querySelectorAll(`.ck-item[data-q="${p.n}"]`).forEach(el => { checks[el.dataset.idx] = el.classList.contains('checked'); });
        answers[p.n] = { type:'checklist', items: p.items, checks: checks };
      } else {
        answers[p.n] = getVal(p);
      }
    });
    window.parent.postMessage({
      type: 'hw-submit',
      answers: answers,
      answered: ans,
      total: tot,
      studentName: document.getElementById('studentName').value || document.getElementById('hName')?.textContent || ''
    }, '*');
  }
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') {
    if (e.target.classList.contains('ce')&&e.key==='Tab') {
      e.preventDefault();
      const s=e.target.selectionStart, en=e.target.selectionEnd;
      e.target.value=e.target.value.substring(0,s)+'    '+e.target.value.substring(en);
      e.target.selectionStart=e.target.selectionEnd=s+4; sv();
    }
    return;
  }
  if (e.key==='ArrowRight') { e.preventDefault(); mv(1); }
  if (e.key==='ArrowLeft') { e.preventDefault(); mv(-1); }
});

// Init
window.addEventListener('DOMContentLoaded', () => {
  const s = ld();
  if (s.name) document.getElementById('studentName').value = s.name;
  document.getElementById('cCnt').textContent = H.p.length;
  document.getElementById('cDue').textContent = H.due;
});

// postMessage bridge: listen for hw-init from parent iframe
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'hw-init') {
    document.getElementById('studentName').value = e.data.studentName || '';
    if (e.data.studentName) go();
  }
});
</script>

</body>
</html>
