<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" font-family="Pretendard, sans-serif">
  <text x="240" y="22" text-anchor="middle" font-size="14" font-weight="800" fill="#1E293B">2진수 → 8진수: 3비트씩 묶기</text>
  <!-- Binary -->
  <rect x="20" y="38" width="440" height="50" rx="10" fill="#EFF6FF" stroke="#3B82F6"/>
  <text x="240" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#1D4ED8">2진수: 1 0 1 1 1 0</text>
  <g text-anchor="middle" font-size="16" font-weight="800" fill="#1D4ED8">
    <text x="120" y="80">1</text><text x="150" y="80">0</text><text x="180" y="80">1</text>
    <text x="240" y="80">1</text><text x="270" y="80">1</text><text x="300" y="80">0</text>
  </g>
  <!-- Grouping brackets -->
  <rect x="105" y="65" width="90" height="22" rx="4" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="225" y="65" width="90" height="22" rx="4" fill="none" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="150" y="100" text-anchor="middle" font-size="9" fill="#EF4444">3비트 묶음</text>
  <text x="270" y="100" text-anchor="middle" font-size="9" fill="#10B981">3비트 묶음</text>
  <!-- Arrows -->
  <text x="150" y="118" text-anchor="middle" font-size="10" fill="#6B7280">↓</text>
  <text x="270" y="118" text-anchor="middle" font-size="10" fill="#6B7280">↓</text>
  <!-- Octal result -->
  <rect x="80" y="125" width="140" height="35" rx="8" fill="#FEF2F2" stroke="#EF4444"/>
  <text x="150" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#DC2626">101₂ = 5₈</text>
  <rect x="260" y="125" width="140" height="35" rx="8" fill="#ECFDF5" stroke="#10B981"/>
  <text x="330" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">110₂ = 6₈</text>
  <!-- Final -->
  <rect x="140" y="170" width="200" height="25" rx="6" fill="#1D4ED8"/>
  <text x="240" y="188" text-anchor="middle" font-size="12" font-weight="700" fill="white">101110₂ = 56₈</text>
</svg>
