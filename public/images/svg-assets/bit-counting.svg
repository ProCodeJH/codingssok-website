<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" font-family="Pretendard, sans-serif">
  <text x="250" y="22" text-anchor="middle" font-size="15" font-weight="800" fill="#1E293B">비트를 늘리면 = 가짓수 2배!</text>
  <!-- 1 bit -->
  <rect x="20" y="40" width="100" height="80" rx="10" fill="#FEF2F2" stroke="#EF4444"/>
  <text x="70" y="62" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">1비트</text>
  <text x="70" y="82" text-anchor="middle" font-size="9" fill="#1E293B">0</text>
  <text x="70" y="96" text-anchor="middle" font-size="9" fill="#1E293B">1</text>
  <text x="70" y="112" text-anchor="middle" font-size="8" fill="#DC2626" font-weight="600">2가지</text>
  <!-- Arrow -->
  <text x="135" y="82" text-anchor="middle" font-size="12" fill="#6B7280">×2→</text>
  <!-- 2 bit -->
  <rect x="155" y="40" width="100" height="100" rx="10" fill="#FFFBEB" stroke="#F59E0B"/>
  <text x="205" y="62" text-anchor="middle" font-size="11" font-weight="700" fill="#D97706">2비트</text>
  <text x="205" y="80" text-anchor="middle" font-size="8" fill="#1E293B">00  01</text>
  <text x="205" y="94" text-anchor="middle" font-size="8" fill="#1E293B">10  11</text>
  <text x="205" y="132" text-anchor="middle" font-size="8" fill="#D97706" font-weight="600">4가지</text>
  <!-- Arrow -->
  <text x="270" y="82" text-anchor="middle" font-size="12" fill="#6B7280">×2→</text>
  <!-- 3 bit -->
  <rect x="285" y="40" width="100" height="110" rx="10" fill="#EFF6FF" stroke="#3B82F6"/>
  <text x="335" y="62" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">3비트</text>
  <text x="335" y="80" text-anchor="middle" font-size="7" fill="#1E293B">000 001 010 011</text>
  <text x="335" y="94" text-anchor="middle" font-size="7" fill="#1E293B">100 101 110 111</text>
  <text x="335" y="142" text-anchor="middle" font-size="8" fill="#1D4ED8" font-weight="600">8가지</text>
  <!-- Arrow -->
  <text x="400" y="82" text-anchor="middle" font-size="12" fill="#6B7280">×2→</text>
  <!-- 8 bit -->
  <rect x="415" y="40" width="75" height="110" rx="10" fill="#ECFDF5" stroke="#10B981"/>
  <text x="452" y="62" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">8비트</text>
  <text x="452" y="82" text-anchor="middle" font-size="8" fill="#14532D">= 1바이트</text>
  <text x="452" y="100" text-anchor="middle" font-size="22" font-weight="900" fill="#059669">256</text>
  <text x="452" y="118" text-anchor="middle" font-size="8" fill="#059669" font-weight="600">가지!</text>
  <!-- Formula -->
  <rect x="80" y="170" width="340" height="50" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="250" y="192" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">공식: N비트 = 2ᴺ 가지</text>
  <text x="250" y="210" text-anchor="middle" font-size="10" fill="#64748B">범위: 0 ~ (2ᴺ - 1) | 비트 1개 추가 = 가짓수 2배!</text>
  <!-- Data units -->
  <rect x="30" y="235" width="440" height="35" rx="8" fill="#F1F5F9"/>
  <text x="250" y="258" text-anchor="middle" font-size="9.5" fill="#475569">1B=8bit(256) → 1KB≈1000B → 1MB≈1000KB → 1GB≈1000MB → 1TB≈1000GB</text>
</svg>
