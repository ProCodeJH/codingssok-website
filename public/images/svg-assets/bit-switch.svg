<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 180" font-family="Pretendard, sans-serif">
  <text x="230" y="22" text-anchor="middle" font-size="15" font-weight="800" fill="#1E293B">비트(bit) = 전기 스위치</text>
  <!-- OFF -->
  <rect x="30" y="40" width="170" height="120" rx="14" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="115" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#DC2626">꺼짐 = 0</text>
  <circle cx="115" cy="108" r="28" fill="#FCA5A5" stroke="#EF4444" stroke-width="2"/>
  <text x="115" y="115" text-anchor="middle" font-size="24" font-weight="900" fill="#DC2626">0</text>
  <text x="115" y="150" text-anchor="middle" font-size="9" fill="#7F1D1D">전기가 안 흐름</text>
  <!-- ON -->
  <rect x="260" y="40" width="170" height="120" rx="14" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="345" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">켜짐 = 1</text>
  <circle cx="345" cy="108" r="28" fill="#6EE7B7" stroke="#10B981" stroke-width="2"/>
  <text x="345" y="115" text-anchor="middle" font-size="24" font-weight="900" fill="#059669">1</text>
  <text x="345" y="150" text-anchor="middle" font-size="9" fill="#14532D">전기가 흐름!</text>
  <!-- Arrow VS -->
  <text x="230" y="115" text-anchor="middle" font-size="14" font-weight="900" fill="#6B7280">또는</text>
  <!-- Bottom label -->
  <text x="230" y="175" text-anchor="middle" font-size="10" fill="#64748B">이 두 가지 상태만 있어요 — 이것이 1비트!</text>
</svg>
