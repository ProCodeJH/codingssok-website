<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" font-family="Pretendard, sans-serif">
  <text x="250" y="22" text-anchor="middle" font-size="15" font-weight="800" fill="#1E293B">버스 아키텍처 — 부품 간 데이터 통로</text>
  <!-- CPU -->
  <rect x="30" y="50" width="100" height="60" rx="10" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="80" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#DC2626">CPU</text>
  <text x="80" y="98" text-anchor="middle" font-size="8" fill="#7F1D1D">두뇌</text>
  <!-- RAM -->
  <rect x="200" y="50" width="100" height="60" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="250" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">RAM</text>
  <text x="250" y="98" text-anchor="middle" font-size="8" fill="#1E3A5F">책상</text>
  <!-- I/O -->
  <rect x="370" y="50" width="100" height="60" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="420" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">입출력</text>
  <text x="420" y="98" text-anchor="middle" font-size="8" fill="#14532D">키보드/모니터</text>
  <!-- Bus lines -->
  <line x1="80" y1="115" x2="80" y2="140" stroke="#EF4444" stroke-width="2"/>
  <line x1="250" y1="115" x2="250" y2="140" stroke="#3B82F6" stroke-width="2"/>
  <line x1="420" y1="115" x2="420" y2="140" stroke="#10B981" stroke-width="2"/>
  <!-- Data Bus -->
  <rect x="40" y="140" width="420" height="20" rx="5" fill="#3B82F6"/>
  <text x="250" y="154" text-anchor="middle" font-size="9" font-weight="600" fill="white">📦 데이터 버스 — 실제 데이터(0과 1)를 나르는 통로 (택배 물건)</text>
  <!-- Address Bus -->
  <rect x="40" y="164" width="420" height="20" rx="5" fill="#F59E0B"/>
  <text x="250" y="178" text-anchor="middle" font-size="9" font-weight="600" fill="white">📍 주소 버스 — 데이터의 위치를 알려주는 통로 (배송 주소)</text>
  <!-- Control Bus -->
  <rect x="40" y="188" width="420" height="20" rx="5" fill="#10B981"/>
  <text x="250" y="202" text-anchor="middle" font-size="9" font-weight="600" fill="white">🎯 제어 버스 — '읽어라/써라' 명령 신호 통로 (배달 지시)</text>
</svg>
