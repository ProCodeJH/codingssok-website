<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="Pretendard, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF6B6B"/><stop offset="100%" stop-color="#FF8E53"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#60A5FA"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#34D399"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#A78BFA"/></linearGradient>
  </defs>
  <text x="300" y="30" text-anchor="middle" font-size="18" font-weight="800" fill="#1E293B">CPU 명령어 사이클 4단계</text>
  <!-- Step 1 -->
  <rect x="20" y="60" width="120" height="100" rx="14" fill="url(#g1)"/>
  <text x="80" y="92" text-anchor="middle" font-size="28" font-weight="900" fill="white">①</text>
  <text x="80" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="white">인출</text>
  <text x="80" y="138" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Fetch</text>
  <!-- Arrow 1 -->
  <path d="M145 110 L170 110" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- Step 2 -->
  <rect x="175" y="60" width="120" height="100" rx="14" fill="url(#g2)"/>
  <text x="235" y="92" text-anchor="middle" font-size="28" font-weight="900" fill="white">②</text>
  <text x="235" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="white">해독</text>
  <text x="235" y="138" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Decode</text>
  <!-- Arrow 2 -->
  <path d="M300 110 L325 110" stroke="#94A3B8" stroke-width="3"/>
  <!-- Step 3 -->
  <rect x="330" y="60" width="120" height="100" rx="14" fill="url(#g3)"/>
  <text x="390" y="92" text-anchor="middle" font-size="28" font-weight="900" fill="white">③</text>
  <text x="390" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="white">실행</text>
  <text x="390" y="138" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Execute</text>
  <!-- Arrow 3 -->
  <path d="M455 110 L480 110" stroke="#94A3B8" stroke-width="3"/>
  <!-- Step 4 -->
  <rect x="485" y="60" width="100" height="100" rx="14" fill="url(#g4)"/>
  <text x="535" y="92" text-anchor="middle" font-size="28" font-weight="900" fill="white">④</text>
  <text x="535" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="white">저장</text>
  <text x="535" y="138" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Store</text>
  <!-- Descriptions -->
  <rect x="20" y="180" width="120" height="60" rx="8" fill="#FEF2F2" stroke="#FECACA"/>
  <text x="80" y="205" text-anchor="middle" font-size="9.5" fill="#7F1D1D">메모리에서</text>
  <text x="80" y="220" text-anchor="middle" font-size="9.5" fill="#7F1D1D">명령어 가져오기</text>
  <rect x="175" y="180" width="120" height="60" rx="8" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="235" y="205" text-anchor="middle" font-size="9.5" fill="#1E3A5F">무슨 명령인지</text>
  <text x="235" y="220" text-anchor="middle" font-size="9.5" fill="#1E3A5F">해석하기</text>
  <rect x="330" y="180" width="120" height="60" rx="8" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="390" y="205" text-anchor="middle" font-size="9.5" fill="#14532D">ALU에서</text>
  <text x="390" y="220" text-anchor="middle" font-size="9.5" fill="#14532D">계산 실행</text>
  <rect x="485" y="180" width="100" height="60" rx="8" fill="#F5F3FF" stroke="#C4B5FD"/>
  <text x="535" y="205" text-anchor="middle" font-size="9.5" fill="#3B0764">결과를</text>
  <text x="535" y="220" text-anchor="middle" font-size="9.5" fill="#3B0764">메모리에 저장</text>
  <!-- Loop arrow -->
  <path d="M535 245 C535 290, 80 290, 80 245" fill="none" stroke="#FF6B6B" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="300" y="300" text-anchor="middle" font-size="11" fill="#FF6B6B" font-weight="600">이 과정을 1초에 수십억 번 반복! (3GHz = 30억 번/초)</text>
</svg>
