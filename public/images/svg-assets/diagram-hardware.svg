<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 140" width="500" height="140">
  <style>
    text { font-family: 'Pretendard', sans-serif; }
  </style>
  <!-- RAM -->
  <rect x="10" y="20" rx="8" ry="8" width="100" height="80" fill="#3498DB"/>
  <text x="60" y="48" text-anchor="middle" font-size="14" fill="white" font-weight="700">RAM</text>
  <text x="60" y="66" text-anchor="middle" font-size="10" fill="white" opacity="0.85">코드가 올라가는</text>
  <text x="60" y="80" text-anchor="middle" font-size="10" fill="white" opacity="0.85">책상 위</text>
  <text x="60" y="115" text-anchor="middle" font-size="11" fill="#7F8C8D">메모리</text>
  <!-- Arrow -->
  <path d="M115 60 L155 60" stroke="#3498DB" stroke-width="2" fill="none" marker-end="url(#a1)"/>
  <!-- CPU -->
  <rect x="160" y="15" rx="8" ry="8" width="110" height="90" fill="#E74C3C"/>
  <text x="215" y="43" text-anchor="middle" font-size="14" fill="white" font-weight="700">CPU</text>
  <text x="215" y="61" text-anchor="middle" font-size="10" fill="white" opacity="0.85">명령을 실행하는</text>
  <text x="215" y="75" text-anchor="middle" font-size="10" fill="white" opacity="0.85">두뇌</text>
  <text x="215" y="115" text-anchor="middle" font-size="11" fill="#7F8C8D">처리장치</text>
  <!-- Arrow -->
  <path d="M275 60 L315 60" stroke="#E74C3C" stroke-width="2" fill="none" marker-end="url(#a2)"/>
  <!-- Monitor -->
  <rect x="320" y="15" rx="8" ry="8" width="110" height="90" fill="#27AE60"/>
  <rect x="340" y="30" rx="4" ry="4" width="70" height="45" fill="white" opacity="0.85"/>
  <text x="375" y="55" text-anchor="middle" font-size="9" fill="#2C3E50" font-family="JetBrains Mono, monospace" font-weight="600">Hello!</text>
  <text x="375" y="95" text-anchor="middle" font-size="10" fill="white" font-weight="600">모니터</text>
  <text x="375" y="115" text-anchor="middle" font-size="11" fill="#7F8C8D">출력장치</text>
  <!-- Keyboard below -->
  <rect x="435" y="25" rx="6" ry="6" width="55" height="75" fill="#9B59B6"/>
  <text x="462" y="55" text-anchor="middle" font-size="11" fill="white" font-weight="700">키보드</text>
  <text x="462" y="72" text-anchor="middle" font-size="9" fill="white" opacity="0.85">입력</text>
  <text x="462" y="115" text-anchor="middle" font-size="11" fill="#7F8C8D">입력장치</text>
  <!-- Arrow from keyboard to RAM -->
  <path d="M462 100 Q462 130 60 130 Q40 130 40 100" stroke="#9B59B6" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#a3)"/>
  <!-- Title -->
  <text x="250" y="138" text-anchor="middle" font-size="12" fill="#2C3E50" font-weight="600">컴퓨터 하드웨어 구성</text>
  <defs>
    <marker id="a1" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0 0 L7 3.5 L0 7 Z" fill="#3498DB"/></marker>
    <marker id="a2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0 0 L7 3.5 L0 7 Z" fill="#E74C3C"/></marker>
    <marker id="a3" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0 0 L7 3.5 L0 7 Z" fill="#9B59B6"/></marker>
  </defs>
</svg>
