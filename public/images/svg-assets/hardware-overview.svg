<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="Pretendard, sans-serif">
  <text x="300" y="25" text-anchor="middle" font-size="16" font-weight="800" fill="#1E293B">컴퓨터 내부 구조 — 부품들의 관계</text>
  <!-- Input -->
  <rect x="10" y="90" width="90" height="130" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="55" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">입력 장치</text>
  <text x="55" y="140" text-anchor="middle" font-size="8.5" fill="#14532D">⌨️ 키보드</text>
  <text x="55" y="155" text-anchor="middle" font-size="8.5" fill="#14532D">🖱️ 마우스</text>
  <text x="55" y="170" text-anchor="middle" font-size="8.5" fill="#14532D">🎤 마이크</text>
  <text x="55" y="185" text-anchor="middle" font-size="8.5" fill="#14532D">📷 카메라</text>
  <text x="55" y="208" text-anchor="middle" font-size="8" fill="#64748B">사람 → 컴퓨터</text>
  <!-- Arrow to CPU -->
  <path d="M105 155 L140 155" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <!-- CPU -->
  <rect x="145" y="60" width="130" height="190" rx="14" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <text x="210" y="85" text-anchor="middle" font-size="13" font-weight="800" fill="#DC2626">CPU (두뇌)</text>
  <rect x="160" y="95" width="100" height="35" rx="6" fill="#EF4444"/>
  <text x="210" y="117" text-anchor="middle" font-size="9" font-weight="600" fill="white">ALU (계산)</text>
  <rect x="160" y="138" width="100" height="35" rx="6" fill="#F97316"/>
  <text x="210" y="160" text-anchor="middle" font-size="9" font-weight="600" fill="white">CU (제어)</text>
  <rect x="160" y="181" width="100" height="28" rx="6" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="210" y="200" text-anchor="middle" font-size="8" fill="#92400E">캐시 (L1/L2/L3)</text>
  <text x="210" y="235" text-anchor="middle" font-size="8" fill="#7F1D1D">모든 계산+판단</text>
  <!-- Arrow CPU to RAM -->
  <path d="M280 120 L315 120" stroke="#3B82F6" stroke-width="2" fill="none"/>
  <path d="M315 120 L280 120" stroke="#3B82F6" stroke-width="2" fill="none"/>
  <text x="297" y="112" text-anchor="middle" font-size="7" fill="#3B82F6">↔</text>
  <!-- RAM -->
  <rect x="320" y="70" width="110" height="100" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="375" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">RAM (책상)</text>
  <text x="375" y="118" text-anchor="middle" font-size="8.5" fill="#1E3A5F">지금 쓰는 것</text>
  <text x="375" y="133" text-anchor="middle" font-size="8.5" fill="#1E3A5F">올려놓는 곳</text>
  <text x="375" y="155" text-anchor="middle" font-size="8" fill="#DC2626">⚠ 전원 끄면 사라짐!</text>
  <!-- Arrow RAM to SSD -->
  <path d="M375 175 L375 195" stroke="#8B5CF6" stroke-width="2" fill="none"/>
  <text x="375" y="190" text-anchor="middle" font-size="7" fill="#8B5CF6">↕</text>
  <!-- SSD -->
  <rect x="320" y="200" width="110" height="80" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="375" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#7C3AED">SSD (책장)</text>
  <text x="375" y="245" text-anchor="middle" font-size="8.5" fill="#3B0764">오래 보관</text>
  <text x="375" y="260" text-anchor="middle" font-size="8.5" fill="#3B0764">전원 꺼도 유지!</text>
  <!-- GPU -->
  <rect x="460" y="90" width="120" height="80" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="520" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#D97706">GPU</text>
  <text x="520" y="136" text-anchor="middle" font-size="8.5" fill="#78350F">그래픽 처리</text>
  <text x="520" y="150" text-anchor="middle" font-size="8.5" fill="#78350F">AI 학습</text>
  <!-- Arrow CPU to GPU -->
  <path d="M280 155 L455 130" stroke="#F59E0B" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <!-- Output -->
  <rect x="460" y="195" width="120" height="90" rx="12" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="520" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">출력 장치</text>
  <text x="520" y="242" text-anchor="middle" font-size="8.5" fill="#7F1D1D">🖥️ 모니터</text>
  <text x="520" y="257" text-anchor="middle" font-size="8.5" fill="#7F1D1D">🔊 스피커</text>
  <text x="520" y="272" text-anchor="middle" font-size="8.5" fill="#7F1D1D">🖨️ 프린터</text>
  <!-- Arrow CPU to Output -->
  <path d="M280 175 L455 225" stroke="#EF4444" stroke-width="1.5" fill="none"/>
</svg>
