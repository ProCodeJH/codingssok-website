<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="wl" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF6B6B"/><stop offset="100%" stop-color="#FF8E8E"/></linearGradient>
    <linearGradient id="wr" x1="1" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4ECDC4"/><stop offset="100%" stop-color="#6EE7DE"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- 날개 (활짝 펼침) -->
  <ellipse cx="34" cy="40" rx="28" ry="22" fill="url(#wl)" opacity="0.95" transform="rotate(-20 34 40)"/>
  <ellipse cx="34" cy="40" rx="19" ry="14" fill="#FFB3B3" opacity="0.35" transform="rotate(-20 34 40)"/>
  <ellipse cx="32" cy="66" rx="22" ry="16" fill="url(#wl)" opacity="0.85" transform="rotate(-12 32 66)"/>
  <ellipse cx="86" cy="40" rx="28" ry="22" fill="url(#wr)" opacity="0.95" transform="rotate(20 86 40)"/>
  <ellipse cx="86" cy="40" rx="19" ry="14" fill="#B3F0EB" opacity="0.35" transform="rotate(20 86 40)"/>
  <ellipse cx="88" cy="66" rx="22" ry="16" fill="url(#wr)" opacity="0.85" transform="rotate(12 88 66)"/>
  <!-- 몸통 -->
  <ellipse cx="60" cy="62" rx="12" ry="18" fill="#FFE66D" filter="url(#sh)"/>
  <ellipse cx="60" cy="62" rx="9" ry="14" fill="#FFF3B0" opacity="0.5"/>
  <!-- 머리 -->
  <circle cx="60" cy="38" r="16" fill="#FFE66D" filter="url(#sh)"/>
  <!-- 눈 (반짝 별 눈) -->
  <path d="M53 36 l-2-3 -2 3 -3-1 2 3 -2 3 3-1 2 3 2-3 3 1 -2-3 2-3z" fill="#2C3E50" transform="scale(0.8) translate(12 8)"/>
  <path d="M67 36 l-2-3 -2 3 -3-1 2 3 -2 3 3-1 2 3 2-3 3 1 -2-3 2-3z" fill="#2C3E50" transform="scale(0.8) translate(30 8)"/>
  <!-- 입 (크게 웃음) -->
  <path d="M51 42 Q60 52 69 42" stroke="#2C3E50" stroke-width="2" fill="#FF8E8E" opacity="0.6" stroke-linecap="round"/>
  <!-- 볼터치 -->
  <ellipse cx="46" cy="42" rx="4.5" ry="3" fill="#FFB3B3" opacity="0.7"/>
  <ellipse cx="74" cy="42" rx="4.5" ry="3" fill="#FFB3B3" opacity="0.7"/>
  <!-- 더듬이 -->
  <path d="M54 24 Q46 8 40 5" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="40" cy="5" r="3.5" fill="#FF6B6B"/>
  <path d="M66 24 Q74 8 80 5" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="80" cy="5" r="3.5" fill="#4ECDC4"/>
  <!-- 전구 아이콘 -->
  <circle cx="60" cy="12" r="8" fill="#FFD93D" filter="url(#glow)" opacity="0.9"/>
  <text x="56.5" y="16" font-size="11" fill="#FF6B6B" font-weight="bold">💡</text>
  <!-- 반짝 효과 -->
  <line x1="35" y1="15" x2="30" y2="10" stroke="#FFD93D" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <line x1="85" y1="15" x2="90" y2="10" stroke="#FFD93D" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <line x1="20" y1="35" x2="14" y2="33" stroke="#FFD93D" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="100" y1="35" x2="106" y2="33" stroke="#FFD93D" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <!-- 두 팔 들기 -->
  <path d="M42 58 Q32 48 26 42" stroke="#FFE66D" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M78 58 Q88 48 94 42" stroke="#FFE66D" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- 다리 -->
  <line x1="55" y1="78" x2="52" y2="88" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="79" x2="60" y2="90" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
  <line x1="65" y1="78" x2="68" y2="88" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
</svg>
