<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" font-family="Pretendard, sans-serif">
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="800" fill="#1E293B">4가지 진법 비교표</text>
  <!-- Headers -->
  <rect x="20" y="35" width="460" height="28" rx="6" fill="#1E293B"/>
  <g text-anchor="middle" font-size="11" font-weight="700" fill="white">
    <text x="80" y="54">10진수</text><text x="185" y="54">2진수</text><text x="310" y="54">8진수</text><text x="420" y="54">16진수</text>
  </g>
  <!-- Rows -->
  <g font-size="10" text-anchor="middle">
    <rect x="20" y="65" width="460" height="22" fill="#F8FAFC"/>
    <text x="80" y="80" fill="#1E293B">0</text><text x="185" y="80" fill="#1D4ED8">0000</text><text x="310" y="80" fill="#059669">0</text><text x="420" y="80" fill="#7C3AED">0</text>
    <rect x="20" y="87" width="460" height="22" fill="#EFF6FF"/>
    <text x="80" y="102" fill="#1E293B">7</text><text x="185" y="102" fill="#1D4ED8">0111</text><text x="310" y="102" fill="#059669">7</text><text x="420" y="102" fill="#7C3AED">7</text>
    <rect x="20" y="109" width="460" height="22" fill="#F8FAFC"/>
    <text x="80" y="124" fill="#1E293B">10</text><text x="185" y="124" fill="#1D4ED8">1010</text><text x="310" y="124" fill="#059669">12</text><text x="420" y="124" fill="#7C3AED" font-weight="700">A</text>
    <rect x="20" y="131" width="460" height="22" fill="#EFF6FF"/>
    <text x="80" y="146" fill="#1E293B">15</text><text x="185" y="146" fill="#1D4ED8">1111</text><text x="310" y="146" fill="#059669">17</text><text x="420" y="146" fill="#7C3AED" font-weight="700">F</text>
    <rect x="20" y="153" width="460" height="22" fill="#F8FAFC"/>
    <text x="80" y="168" fill="#1E293B">100</text><text x="185" y="168" fill="#1D4ED8">1100100</text><text x="310" y="168" fill="#059669">144</text><text x="420" y="168" fill="#7C3AED">64</text>
    <rect x="20" y="175" width="460" height="22" fill="#EFF6FF"/>
    <text x="80" y="190" fill="#1E293B" font-weight="700">255</text><text x="185" y="190" fill="#1D4ED8" font-weight="700">11111111</text><text x="310" y="190" fill="#059669" font-weight="700">377</text><text x="420" y="190" fill="#7C3AED" font-weight="700">FF</text>
  </g>
  <!-- Bottom note -->
  <rect x="40" y="205" width="420" height="35" rx="8" fill="#F1F5F9"/>
  <text x="250" y="222" text-anchor="middle" font-size="10" fill="#475569">255 = 11111111₂(8자리) = FF₁₆(2자리!) → 16진수가 훨씬 짧아요!</text>
  <text x="250" y="236" text-anchor="middle" font-size="9" fill="#64748B">1바이트 = 16진수 2자리 = 8진수 3자리 = 2진수 8자리</text>
</svg>
