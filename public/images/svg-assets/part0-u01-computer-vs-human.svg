<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 630 380" font-family="sans-serif">
  <defs>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Title -->
  <text x="315" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#2C3E50">컴퓨터 vs 사람 대결!</text>
  
  <!-- Computer side -->
  <rect x="30" y="55" width="270" height="310" rx="16" fill="#F0F7FF" stroke="#3498DB" stroke-width="2" filter="url(#shadow1)"/>
  <rect x="30" y="55" width="270" height="45" rx="16" fill="#3498DB"/>
  <rect x="30" y="84" width="270" height="16" fill="#3498DB"/>
  <text x="165" y="85" text-anchor="middle" font-size="18" font-weight="bold" fill="white">컴퓨터</text>
  
  <!-- Computer icon -->
  <rect x="130" y="110" width="70" height="50" rx="5" fill="#2C3E50"/>
  <rect x="138" y="116" width="54" height="38" rx="2" fill="#4FC3F7"/>
  <rect x="150" y="162" width="30" height="8" rx="2" fill="#7F8C8D"/>
  <rect x="140" y="170" width="50" height="5" rx="2" fill="#95A5A6"/>
  
  <!-- Computer strengths -->
  <g transform="translate(50, 195)">
    <circle cx="0" cy="0" r="10" fill="#27AE60"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="white" font-weight="bold">O</text>
    <text x="18" y="5" font-size="14" fill="#2C3E50">빠른 계산 (1초에 수십억 번)</text>
  </g>
  <g transform="translate(50, 225)">
    <circle cx="0" cy="0" r="10" fill="#27AE60"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="white" font-weight="bold">O</text>
    <text x="18" y="5" font-size="14" fill="#2C3E50">반복 작업 (지치지 않음)</text>
  </g>
  <g transform="translate(50, 255)">
    <circle cx="0" cy="0" r="10" fill="#27AE60"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="white" font-weight="bold">O</text>
    <text x="18" y="5" font-size="14" fill="#2C3E50">정확한 기억 (실수 0)</text>
  </g>
  <g transform="translate(50, 285)">
    <circle cx="0" cy="0" r="10" fill="#E74C3C"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="white" font-weight="bold">X</text>
    <text x="18" y="5" font-size="14" fill="#2C3E50">스스로 생각하기</text>
  </g>
  <g transform="translate(50, 315)">
    <circle cx="0" cy="0" r="10" fill="#E74C3C"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="white" font-weight="bold">X</text>
    <text x="18" y="5" font-size="14" fill="#2C3E50">창의적인 아이디어</text>
  </g>
  <g transform="translate(50, 345)">
    <circle cx="0" cy="0" r="10" fill="#E74C3C"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="white" font-weight="bold">X</text>
    <text x="18" y="5" font-size="14" fill="#2C3E50">감정 이해</text>
  </g>

  <!-- Human side -->
  <rect x="330" y="55" width="270" height="310" rx="16" fill="#FFF0F0" stroke="#FF6B6B" stroke-width="2" filter="url(#shadow1)"/>
  <rect x="330" y="55" width="270" height="45" rx="16" fill="#FF6B6B"/>
  <rect x="330" y="84" width="270" height="16" fill="#FF6B6B"/>
  <text x="465" y="85" text-anchor="middle" font-size="18" font-weight="bold" fill="white">사람</text>
  
  <!-- Human icon -->
  <circle cx="465" cy="125" r="18" fill="#F39C12"/>
  <text x="465" y="131" text-anchor="middle" font-size="20">:)</text>
  <line x1="465" y1="143" x2="465" y2="170" stroke="#F39C12" stroke-width="3" stroke-linecap="round"/>
  <line x1="448" y1="155" x2="482" y2="155" stroke="#F39C12" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Human strengths -->
  <g transform="translate(350, 195)">
    <circle cx="0" cy="0" r="10" fill="#27AE60"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="white" font-weight="bold">O</text>
    <text x="18" y="5" font-size="14" fill="#2C3E50">창의력과 상상력</text>
  </g>
  <g transform="translate(350, 225)">
    <circle cx="0" cy="0" r="10" fill="#27AE60"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="white" font-weight="bold">O</text>
    <text x="18" y="5" font-size="14" fill="#2C3E50">감정 이해와 공감</text>
  </g>
  <g transform="translate(350, 255)">
    <circle cx="0" cy="0" r="10" fill="#27AE60"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="white" font-weight="bold">O</text>
    <text x="18" y="5" font-size="14" fill="#2C3E50">새로운 문제 해결</text>
  </g>
  <g transform="translate(350, 285)">
    <circle cx="0" cy="0" r="10" fill="#E74C3C"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="white" font-weight="bold">X</text>
    <text x="18" y="5" font-size="14" fill="#2C3E50">빠른 계산 (느림)</text>
  </g>
  <g transform="translate(350, 315)">
    <circle cx="0" cy="0" r="10" fill="#E74C3C"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="white" font-weight="bold">X</text>
    <text x="18" y="5" font-size="14" fill="#2C3E50">반복하면 지침</text>
  </g>
  <g transform="translate(350, 345)">
    <circle cx="0" cy="0" r="10" fill="#E74C3C"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="white" font-weight="bold">X</text>
    <text x="18" y="5" font-size="14" fill="#2C3E50">실수가 있음</text>
  </g>
</svg>