<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 630 300" font-family="sans-serif">
  <defs>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  <text x="315" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2C3E50">프로그래밍 = 컴퓨터에게 일을 시키는 것</text>
  
  <!-- Person -->
  <rect x="30" y="60" width="140" height="180" rx="14" fill="#FFFBF0" stroke="#F39C12" stroke-width="2" filter="url(#shadow2)"/>
  <circle cx="100" cy="100" r="24" fill="#F39C12"/>
  <text x="100" y="107" text-anchor="middle" font-size="22" fill="white">:D</text>
  <text x="100" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C3E50">프로그래머</text>
  <text x="100" y="168" text-anchor="middle" font-size="12" fill="#7F8C8D">(명령을 내리는 사람)</text>
  <text x="100" y="190" text-anchor="middle" font-size="12" fill="#7F8C8D">"화면에 '안녕'</text>
  <text x="100" y="206" text-anchor="middle" font-size="12" fill="#7F8C8D">이라고 찍어!"</text>
  
  <!-- Arrow 1 -->
  <line x1="175" y1="140" x2="225" y2="140" stroke="#3498DB" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498DB"/>
    </marker>
  </defs>
  <text x="200" y="128" text-anchor="middle" font-size="11" fill="#3498DB" font-weight="bold">코드 작성</text>
  
  <!-- Code -->
  <rect x="230" y="60" width="170" height="180" rx="14" fill="#1E1E1E" stroke="#555" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="230" y="60" width="170" height="30" rx="14" fill="#333"/>
  <rect x="230" y="78" width="170" height="12" fill="#333"/>
  <circle cx="248" cy="75" r="5" fill="#E74C3C"/>
  <circle cx="263" cy="75" r="5" fill="#F39C12"/>
  <circle cx="278" cy="75" r="5" fill="#27AE60"/>
  <text x="315" y="115" text-anchor="middle" font-size="11" fill="#569CD6" font-family="monospace">#include &lt;stdio.h&gt;</text>
  <text x="315" y="138" text-anchor="middle" font-size="11" fill="#DCDCAA" font-family="monospace">int main(void) {</text>
  <text x="315" y="161" text-anchor="middle" font-size="11" fill="#CE9178" font-family="monospace">  printf("안녕!");</text>
  <text x="315" y="184" text-anchor="middle" font-size="11" fill="#569CD6" font-family="monospace">  return 0;</text>
  <text x="315" y="207" text-anchor="middle" font-size="11" fill="#D4D4D4" font-family="monospace">}</text>
  <text x="315" y="230" text-anchor="middle" font-size="12" font-weight="bold" fill="#3498DB">프로그램(코드)</text>

  <!-- Arrow 2 -->
  <line x1="405" y1="140" x2="455" y2="140" stroke="#27AE60" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27AE60"/>
    </marker>
  </defs>
  <text x="430" y="128" text-anchor="middle" font-size="11" fill="#27AE60" font-weight="bold">실행!</text>
  
  <!-- Computer/Result -->
  <rect x="460" y="60" width="140" height="180" rx="14" fill="#F0FFF4" stroke="#27AE60" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="488" y="80" width="84" height="60" rx="6" fill="#2C3E50"/>
  <rect x="493" y="85" width="74" height="50" rx="3" fill="#4FC3F7"/>
  <text x="530" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50">안녕!</text>
  <rect x="510" y="142" width="40" height="8" rx="2" fill="#7F8C8D"/>
  <rect x="500" y="150" width="60" height="5" rx="2" fill="#95A5A6"/>
  <text x="530" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C3E50">컴퓨터</text>
  <text x="530" y="198" text-anchor="middle" font-size="12" fill="#7F8C8D">(명령을 수행)</text>
  <text x="530" y="218" text-anchor="middle" font-size="12" fill="#27AE60">결과: "안녕!"</text>
  
  <!-- Bottom text -->
  <rect x="140" y="260" width="350" height="32" rx="10" fill="#FF6B6B"/>
  <text x="315" y="282" text-anchor="middle" font-size="15" font-weight="bold" fill="white">프로그래밍 = 컴퓨터에게 시키고 싶은 일을 코드로 쓰는 것</text>
</svg>