<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" font-family="Pretendard, sans-serif">
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="800" fill="#1E293B">주요 ASCII 코드 — 꼭 외울 3가지: A=65, a=97, '0'=48</text>
  <!-- Header -->
  <rect x="15" y="32" width="470" height="24" rx="4" fill="#1E293B"/>
  <g text-anchor="middle" font-size="10" font-weight="700" fill="white">
    <text x="50" y="48">코드</text><text x="115" y="48">문자</text><text x="200" y="48">코드</text><text x="265" y="48">문자</text><text x="350" y="48">코드</text><text x="430" y="48">문자</text>
  </g>
  <!-- Data rows -->
  <g font-size="9" text-anchor="middle">
    <!-- Col1: 대문자 -->
    <rect x="15" y="58" width="155" height="18" fill="#EFF6FF"/>
    <text x="50" y="71" fill="#1D4ED8" font-weight="700">65</text><text x="115" y="71" fill="#1E293B" font-weight="800">A</text>
    <rect x="15" y="76" width="155" height="18" fill="#F8FAFC"/>
    <text x="50" y="89" fill="#1D4ED8">66</text><text x="115" y="89" fill="#1E293B">B</text>
    <rect x="15" y="94" width="155" height="18" fill="#EFF6FF"/>
    <text x="50" y="107" fill="#1D4ED8">67~89</text><text x="115" y="107" fill="#1E293B">C~Y</text>
    <rect x="15" y="112" width="155" height="18" fill="#F8FAFC"/>
    <text x="50" y="125" fill="#1D4ED8" font-weight="700">90</text><text x="115" y="125" fill="#1E293B" font-weight="800">Z</text>
    <!-- Col2: 소문자 -->
    <rect x="175" y="58" width="155" height="18" fill="#ECFDF5"/>
    <text x="200" y="71" fill="#059669" font-weight="700">97</text><text x="265" y="71" fill="#1E293B" font-weight="800">a</text>
    <rect x="175" y="76" width="155" height="18" fill="#F8FAFC"/>
    <text x="200" y="89" fill="#059669">98</text><text x="265" y="89" fill="#1E293B">b</text>
    <rect x="175" y="94" width="155" height="18" fill="#ECFDF5"/>
    <text x="200" y="107" fill="#059669">99~121</text><text x="265" y="107" fill="#1E293B">c~y</text>
    <rect x="175" y="112" width="155" height="18" fill="#F8FAFC"/>
    <text x="200" y="125" fill="#059669" font-weight="700">122</text><text x="265" y="125" fill="#1E293B" font-weight="800">z</text>
    <!-- Col3: 숫자+기호 -->
    <rect x="335" y="58" width="150" height="18" fill="#FEF2F2"/>
    <text x="350" y="71" fill="#DC2626" font-weight="700">48</text><text x="430" y="71" fill="#1E293B" font-weight="800">'0'</text>
    <rect x="335" y="76" width="150" height="18" fill="#F8FAFC"/>
    <text x="350" y="89" fill="#DC2626">49~56</text><text x="430" y="89" fill="#1E293B">'1'~'8'</text>
    <rect x="335" y="94" width="150" height="18" fill="#FEF2F2"/>
    <text x="350" y="107" fill="#DC2626" font-weight="700">57</text><text x="430" y="107" fill="#1E293B" font-weight="800">'9'</text>
    <rect x="335" y="112" width="150" height="18" fill="#F8FAFC"/>
    <text x="350" y="125" fill="#64748B">32</text><text x="430" y="125" fill="#1E293B">스페이스</text>
  </g>
  <!-- Key insights -->
  <rect x="20" y="140" width="220" height="70" rx="8" fill="#DBEAFE" stroke="#3B82F6"/>
  <text x="130" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">핵심 규칙 1</text>
  <text x="130" y="178" text-anchor="middle" font-size="11" font-weight="800" fill="#1E293B">대문자 + 32 = 소문자</text>
  <text x="130" y="198" text-anchor="middle" font-size="9" fill="#475569">A(65)+32=a(97), 비트 1개 차이!</text>
  <rect x="260" y="140" width="220" height="70" rx="8" fill="#FEE2E2" stroke="#EF4444"/>
  <text x="370" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#DC2626">핵심 규칙 2</text>
  <text x="370" y="178" text-anchor="middle" font-size="11" font-weight="800" fill="#1E293B">'5' - '0' = 숫자 5</text>
  <text x="370" y="198" text-anchor="middle" font-size="9" fill="#475569">53 - 48 = 5. 문자→숫자 변환 공식!</text>
  <!-- Special chars -->
  <rect x="20" y="220" width="460" height="70" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/>
  <text x="250" y="240" text-anchor="middle" font-size="10" font-weight="700" fill="#1E293B">제어 문자 (눈에 안 보여요!)</text>
  <text x="250" y="260" text-anchor="middle" font-size="9" fill="#475569">0=NUL(\0 문자열 끝) | 9=TAB(\t 탭) | 10=LF(\n 줄바꿈) | 13=CR(\r) | 32=스페이스</text>
  <text x="250" y="278" text-anchor="middle" font-size="9" fill="#64748B">Windows 줄바꿈: \r\n(13+10) | Mac/Linux: \n(10만)</text>
</svg>
