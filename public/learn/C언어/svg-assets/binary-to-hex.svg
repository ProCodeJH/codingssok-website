<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" font-family="Pretendard, sans-serif">
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="800" fill="#1E293B">2진수 → 16진수: 4비트씩 묶기</text>
  <!-- Binary -->
  <rect x="20" y="38" width="460" height="50" rx="10" fill="#EFF6FF" stroke="#3B82F6"/>
  <text x="250" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#1D4ED8">2진수: 1 1 0 1 1 0 1 0</text>
  <g text-anchor="middle" font-size="16" font-weight="800" fill="#1D4ED8">
    <text x="120" y="80">1</text><text x="148" y="80">1</text><text x="176" y="80">0</text><text x="204" y="80">1</text>
    <text x="262" y="80">1</text><text x="290" y="80">0</text><text x="318" y="80">1</text><text x="346" y="80">0</text>
  </g>
  <!-- Grouping -->
  <rect x="106" y="65" width="112" height="22" rx="4" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="248" y="65" width="112" height="22" rx="4" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="162" y="100" text-anchor="middle" font-size="9" fill="#8B5CF6">4비트 묶음</text>
  <text x="304" y="100" text-anchor="middle" font-size="9" fill="#F59E0B">4비트 묶음</text>
  <!-- Arrows -->
  <text x="162" y="118" text-anchor="middle" font-size="10" fill="#6B7280">↓</text>
  <text x="304" y="118" text-anchor="middle" font-size="10" fill="#6B7280">↓</text>
  <!-- Hex result -->
  <rect x="90" y="125" width="145" height="35" rx="8" fill="#F5F3FF" stroke="#8B5CF6"/>
  <text x="162" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#7C3AED">1101₂ = D₁₆</text>
  <rect x="265" y="125" width="145" height="35" rx="8" fill="#FFFBEB" stroke="#F59E0B"/>
  <text x="338" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#D97706">1010₂ = A₁₆</text>
  <!-- Final -->
  <rect x="150" y="170" width="200" height="25" rx="6" fill="#7C3AED"/>
  <text x="250" y="188" text-anchor="middle" font-size="12" font-weight="700" fill="white">11011010₂ = DA₁₆</text>
</svg>
