<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 260" font-family="Pretendard, sans-serif">
  <text x="250" y="22" text-anchor="middle" font-size="15" font-weight="800" fill="#1E293B">캐시 = 학교 비유</text>
  <text x="250" y="42" text-anchor="middle" font-size="10" fill="#64748B">가까울수록 빠르지만 공간이 작아요!</text>
  <!-- L1: Desk drawer -->
  <rect x="170" y="55" width="160" height="35" rx="8" fill="#EF4444"/>
  <text x="250" y="73" text-anchor="middle" font-size="10" font-weight="700" fill="white">L1 캐시 = 책상 서랍</text>
  <text x="250" y="85" text-anchor="middle" font-size="8" fill="#FEE2E2">32~64KB | 1ns | 바로 꺼냄!</text>
  <text x="80" y="75" text-anchor="end" font-size="22">📂</text>
  <!-- L2: Bag -->
  <rect x="140" y="98" width="220" height="35" rx="8" fill="#F97316"/>
  <text x="250" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="white">L2 캐시 = 가방</text>
  <text x="250" y="128" text-anchor="middle" font-size="8" fill="#FEF3C7">256KB~1MB | 3~10ns | 1초 걸림</text>
  <text x="55" y="118" text-anchor="end" font-size="22">🎒</text>
  <!-- L3: Locker -->
  <rect x="110" y="141" width="280" height="35" rx="8" fill="#EAB308"/>
  <text x="250" y="159" text-anchor="middle" font-size="10" font-weight="700" fill="white">L3 캐시 = 사물함</text>
  <text x="250" y="171" text-anchor="middle" font-size="8" fill="#422006">8~64MB | 10~30ns | 일어나서 가야 함</text>
  <text x="30" y="161" text-anchor="end" font-size="22">🗄️</text>
  <!-- RAM: Bookshelf -->
  <rect x="80" y="184" width="340" height="35" rx="8" fill="#3B82F6"/>
  <text x="250" y="202" text-anchor="middle" font-size="10" font-weight="700" fill="white">RAM = 교실 뒤 책장</text>
  <text x="250" y="214" text-anchor="middle" font-size="8" fill="#DBEAFE">8~64GB | 50~100ns | 걸어가야 함</text>
  <text x="445" y="204" text-anchor="start" font-size="22">📚</text>
  <!-- SSD: Library -->
  <rect x="50" y="227" width="400" height="28" rx="8" fill="#8B5CF6"/>
  <text x="250" y="245" text-anchor="middle" font-size="10" font-weight="700" fill="white">SSD = 도서관 🏫 (건물 밖으로 나가야 해요!)</text>
</svg>
