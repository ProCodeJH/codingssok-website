<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="Pretendard, sans-serif">
  <text x="300" y="28" text-anchor="middle" font-size="18" font-weight="800" fill="#1E293B">컴퓨팅사고력 4단계 — 자판기 예시</text>
  <!-- Step 1: Decomposition -->
  <rect x="15" y="50" width="135" height="280" rx="12" fill="#FEF2F2" stroke="#FF6B6B" stroke-width="1.5"/>
  <circle cx="82" cy="80" r="20" fill="#FF6B6B"/>
  <text x="82" y="87" text-anchor="middle" font-size="18" font-weight="900" fill="white">1</text>
  <text x="82" y="115" text-anchor="middle" font-size="13" font-weight="800" fill="#DC2626">분해</text>
  <text x="82" y="132" text-anchor="middle" font-size="9" fill="#7F1D1D">Decomposition</text>
  <line x1="30" y1="142" x2="135" y2="142" stroke="#FECACA"/>
  <text x="25" y="162" font-size="8.5" fill="#7F1D1D">큰 문제를</text>
  <text x="25" y="176" font-size="8.5" fill="#7F1D1D">작은 조각으로!</text>
  <rect x="22" y="188" width="120" height="18" rx="4" fill="white" stroke="#FECACA"/>
  <text x="82" y="201" text-anchor="middle" font-size="8" fill="#991B1B">① 동전 넣기</text>
  <rect x="22" y="210" width="120" height="18" rx="4" fill="white" stroke="#FECACA"/>
  <text x="82" y="223" text-anchor="middle" font-size="8" fill="#991B1B">② 금액 표시</text>
  <rect x="22" y="232" width="120" height="18" rx="4" fill="white" stroke="#FECACA"/>
  <text x="82" y="245" text-anchor="middle" font-size="8" fill="#991B1B">③ 버튼 누르기</text>
  <rect x="22" y="254" width="120" height="18" rx="4" fill="white" stroke="#FECACA"/>
  <text x="82" y="267" text-anchor="middle" font-size="8" fill="#991B1B">④ 음료 나오기</text>
  <rect x="22" y="276" width="120" height="18" rx="4" fill="white" stroke="#FECACA"/>
  <text x="82" y="289" text-anchor="middle" font-size="8" fill="#991B1B">⑤ 거스름돈</text>
  <!-- Arrow -->
  <text x="160" y="195" font-size="20" fill="#94A3B8">→</text>
  <!-- Step 2: Pattern -->
  <rect x="170" y="50" width="135" height="280" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <circle cx="237" cy="80" r="20" fill="#3B82F6"/>
  <text x="237" y="87" text-anchor="middle" font-size="18" font-weight="900" fill="white">2</text>
  <text x="237" y="115" text-anchor="middle" font-size="13" font-weight="800" fill="#1D4ED8">패턴 인식</text>
  <text x="237" y="132" text-anchor="middle" font-size="9" fill="#1E3A5F">Pattern Recognition</text>
  <line x1="185" y1="142" x2="290" y2="142" stroke="#BFDBFE"/>
  <text x="180" y="162" font-size="8.5" fill="#1E3A5F">반복되는</text>
  <text x="180" y="176" font-size="8.5" fill="#1E3A5F">규칙 찾기!</text>
  <rect x="177" y="190" width="120" height="40" rx="6" fill="white" stroke="#BFDBFE"/>
  <text x="237" y="208" text-anchor="middle" font-size="8" fill="#1D4ED8">동전 넣기 → 금액 증가</text>
  <text x="237" y="222" text-anchor="middle" font-size="8" fill="#1D4ED8">이 패턴이 반복됨!</text>
  <rect x="177" y="240" width="120" height="40" rx="6" fill="white" stroke="#BFDBFE"/>
  <text x="237" y="258" text-anchor="middle" font-size="8" fill="#1D4ED8">→ 반복문(while)으로</text>
  <text x="237" y="272" text-anchor="middle" font-size="8" fill="#1D4ED8">   코드화 가능!</text>
  <!-- Arrow -->
  <text x="315" y="195" font-size="20" fill="#94A3B8">→</text>
  <!-- Step 3: Abstraction -->
  <rect x="325" y="50" width="135" height="280" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <circle cx="392" cy="80" r="20" fill="#10B981"/>
  <text x="392" y="87" text-anchor="middle" font-size="18" font-weight="900" fill="white">3</text>
  <text x="392" y="115" text-anchor="middle" font-size="13" font-weight="800" fill="#059669">추상화</text>
  <text x="392" y="132" text-anchor="middle" font-size="9" fill="#14532D">Abstraction</text>
  <line x1="340" y1="142" x2="445" y2="142" stroke="#A7F3D0"/>
  <text x="335" y="162" font-size="8.5" fill="#14532D">중요한 것만</text>
  <text x="335" y="176" font-size="8.5" fill="#14532D">남기고 무시!</text>
  <rect x="332" y="190" width="120" height="30" rx="6" fill="#D1FAE5" stroke="#6EE7B7"/>
  <text x="392" y="209" text-anchor="middle" font-size="8" fill="#059669">✓ 금액, 버튼 번호</text>
  <rect x="332" y="228" width="120" height="46" rx="6" fill="#FEE2E2" stroke="#FCA5A5"/>
  <text x="392" y="246" text-anchor="middle" font-size="8" fill="#DC2626">✗ 동전 색깔</text>
  <text x="392" y="259" text-anchor="middle" font-size="8" fill="#DC2626">✗ 자판기 브랜드</text>
  <text x="392" y="272" text-anchor="middle" font-size="8" fill="#DC2626">✗ 날씨</text>
  <!-- Arrow -->
  <text x="470" y="195" font-size="20" fill="#94A3B8">→</text>
  <!-- Step 4: Algorithm -->
  <rect x="480" y="50" width="110" height="280" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <circle cx="535" cy="80" r="20" fill="#8B5CF6"/>
  <text x="535" y="87" text-anchor="middle" font-size="18" font-weight="900" fill="white">4</text>
  <text x="535" y="115" text-anchor="middle" font-size="13" font-weight="800" fill="#7C3AED">알고리즘</text>
  <text x="535" y="132" text-anchor="middle" font-size="9" fill="#3B0764">Algorithm</text>
  <line x1="490" y1="142" x2="580" y2="142" stroke="#C4B5FD"/>
  <text x="490" y="162" font-size="8.5" fill="#3B0764">순서대로</text>
  <text x="490" y="176" font-size="8.5" fill="#3B0764">절차 작성!</text>
  <rect x="487" y="190" width="96" height="118" rx="6" fill="white" stroke="#C4B5FD"/>
  <text x="491" y="207" font-size="7.5" fill="#3B0764">금액=0</text>
  <text x="491" y="222" font-size="7.5" fill="#3B0764">반복:</text>
  <text x="497" y="237" font-size="7.5" fill="#3B0764">동전 받기</text>
  <text x="497" y="252" font-size="7.5" fill="#3B0764">금액 += 동전</text>
  <text x="491" y="267" font-size="7.5" fill="#3B0764">만약 금액≥가격:</text>
  <text x="497" y="282" font-size="7.5" fill="#3B0764">음료 배출</text>
  <text x="497" y="297" font-size="7.5" fill="#3B0764">거스름돈 반환</text>
</svg>
