<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" font-family="Pretendard, sans-serif">
  <text x="300" y="28" text-anchor="middle" font-size="18" font-weight="800" fill="#1E293B">숨겨진 컴퓨터들 — 임베디드 시스템</text>
  <!-- Car -->
  <rect x="15" y="50" width="108" height="190" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="69" y="80" text-anchor="middle" font-size="28">🚗</text>
  <text x="69" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">자동차</text>
  <text x="69" y="122" text-anchor="middle" font-size="8.5" fill="#1E3A5F">ECU 100개+</text>
  <text x="69" y="137" text-anchor="middle" font-size="8" fill="#64748B">엔진 제어</text>
  <text x="69" y="151" text-anchor="middle" font-size="8" fill="#64748B">브레이크 ABS</text>
  <text x="69" y="165" text-anchor="middle" font-size="8" fill="#64748B">에어백 센서</text>
  <text x="69" y="179" text-anchor="middle" font-size="8" fill="#64748B">네비게이션</text>
  <rect x="25" y="192" width="88" height="18" rx="4" fill="#DBEAFE"/>
  <text x="69" y="205" text-anchor="middle" font-size="7.5" fill="#1D4ED8" font-weight="600">대부분 C언어!</text>
  <text x="69" y="230" text-anchor="middle" font-size="8" fill="#94A3B8">안전이 생명이라</text>
  <text x="69" y="242" text-anchor="middle" font-size="8" fill="#94A3B8">버그 = 사고</text>
  <!-- Microwave -->
  <rect x="133" y="50" width="108" height="190" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="187" y="80" text-anchor="middle" font-size="28">🔥</text>
  <text x="187" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">전자레인지</text>
  <text x="187" y="122" text-anchor="middle" font-size="8.5" fill="#14532D">MCU 1개</text>
  <text x="187" y="137" text-anchor="middle" font-size="8" fill="#64748B">시간 카운터</text>
  <text x="187" y="151" text-anchor="middle" font-size="8" fill="#64748B">온도 제어</text>
  <text x="187" y="165" text-anchor="middle" font-size="8" fill="#64748B">회전판 모터</text>
  <text x="187" y="179" text-anchor="middle" font-size="8" fill="#64748B">버튼 입력 처리</text>
  <rect x="143" y="192" width="88" height="18" rx="4" fill="#D1FAE5"/>
  <text x="187" y="205" text-anchor="middle" font-size="7.5" fill="#059669" font-weight="600">간단한 프로그램</text>
  <!-- Elevator -->
  <rect x="251" y="50" width="108" height="190" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="305" y="80" text-anchor="middle" font-size="28">🛗</text>
  <text x="305" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#7C3AED">엘리베이터</text>
  <text x="305" y="122" text-anchor="middle" font-size="8.5" fill="#3B0764">PLC 제어기</text>
  <text x="305" y="137" text-anchor="middle" font-size="8" fill="#64748B">층 호출 기억</text>
  <text x="305" y="151" text-anchor="middle" font-size="8" fill="#64748B">최적 경로 계산</text>
  <text x="305" y="165" text-anchor="middle" font-size="8" fill="#64748B">문 개폐 센서</text>
  <text x="305" y="179" text-anchor="middle" font-size="8" fill="#64748B">무게 감지</text>
  <rect x="261" y="192" width="88" height="18" rx="4" fill="#EDE9FE"/>
  <text x="305" y="205" text-anchor="middle" font-size="7.5" fill="#7C3AED" font-weight="600">알고리즘 필수!</text>
  <!-- Traffic Light -->
  <rect x="369" y="50" width="108" height="190" rx="12" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="423" y="80" text-anchor="middle" font-size="28">🚦</text>
  <text x="423" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">신호등</text>
  <text x="423" y="122" text-anchor="middle" font-size="8.5" fill="#7F1D1D">교통 제어 시스템</text>
  <text x="423" y="137" text-anchor="middle" font-size="8" fill="#64748B">초록/빨강 타이머</text>
  <text x="423" y="151" text-anchor="middle" font-size="8" fill="#64748B">교통량 감지</text>
  <text x="423" y="165" text-anchor="middle" font-size="8" fill="#64748B">비상 차량 우선</text>
  <text x="423" y="179" text-anchor="middle" font-size="8" fill="#64748B">보행자 버튼</text>
  <rect x="379" y="192" width="88" height="18" rx="4" fill="#FEE2E2"/>
  <text x="423" y="205" text-anchor="middle" font-size="7.5" fill="#DC2626" font-weight="600">조건문 + 타이머</text>
  <!-- Smartwatch -->
  <rect x="487" y="50" width="100" height="190" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="537" y="80" text-anchor="middle" font-size="28">⌚</text>
  <text x="537" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#D97706">스마트워치</text>
  <text x="537" y="122" text-anchor="middle" font-size="8.5" fill="#78350F">ARM 프로세서</text>
  <text x="537" y="137" text-anchor="middle" font-size="8" fill="#64748B">심박수 센서</text>
  <text x="537" y="151" text-anchor="middle" font-size="8" fill="#64748B">걸음 수 계산</text>
  <text x="537" y="165" text-anchor="middle" font-size="8" fill="#64748B">알림 표시</text>
  <text x="537" y="179" text-anchor="middle" font-size="8" fill="#64748B">GPS 추적</text>
  <rect x="497" y="192" width="80" height="18" rx="4" fill="#FEF3C7"/>
  <text x="537" y="205" text-anchor="middle" font-size="7.5" fill="#D97706" font-weight="600">센서+알고리즘</text>
</svg>
