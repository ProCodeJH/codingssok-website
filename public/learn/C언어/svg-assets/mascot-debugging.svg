<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="wl" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF6B6B"/><stop offset="100%" stop-color="#FF8E8E"/></linearGradient>
    <linearGradient id="wr" x1="1" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4ECDC4"/><stop offset="100%" stop-color="#6EE7DE"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/></filter>
  </defs>
  <!-- 날개 -->
  <ellipse cx="38" cy="45" rx="24" ry="18" fill="url(#wl)" opacity="0.85" transform="rotate(-10 38 45)"/>
  <ellipse cx="35" cy="68" rx="18" ry="13" fill="url(#wl)" opacity="0.7" transform="rotate(-8 35 68)"/>
  <ellipse cx="82" cy="45" rx="24" ry="18" fill="url(#wr)" opacity="0.85" transform="rotate(10 82 45)"/>
  <ellipse cx="85" cy="68" rx="18" ry="13" fill="url(#wr)" opacity="0.7" transform="rotate(8 85 68)"/>
  <!-- 몸통 -->
  <ellipse cx="60" cy="62" rx="12" ry="18" fill="#FFE66D" filter="url(#sh)"/>
  <!-- 머리 -->
  <circle cx="60" cy="38" r="16" fill="#FFE66D" filter="url(#sh)"/>
  <!-- 눈 (집중! 한쪽 눈 크게) -->
  <ellipse cx="53" cy="35" rx="4.5" ry="5" fill="#2C3E50"/>
  <circle cx="51.5" cy="33.5" r="1.8" fill="white"/>
  <ellipse cx="67" cy="35" rx="3.5" ry="4" fill="#2C3E50"/>
  <circle cx="65.8" cy="33.5" r="1.3" fill="white"/>
  <!-- 입 (삐죽) -->
  <path d="M55 44 L60 42 L65 44" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 볼터치 -->
  <ellipse cx="47" cy="42" rx="4" ry="2.5" fill="#FFB3B3" opacity="0.5"/>
  <ellipse cx="73" cy="42" rx="4" ry="2.5" fill="#FFB3B3" opacity="0.5"/>
  <!-- 더듬이 -->
  <path d="M54 24 Q48 10 42 8" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="42" cy="8" r="3" fill="#FF6B6B"/>
  <path d="M66 24 Q72 10 78 8" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="78" cy="8" r="3" fill="#4ECDC4"/>
  <!-- 돋보기 -->
  <circle cx="88" cy="55" r="10" fill="none" stroke="#3498DB" stroke-width="2.5"/>
  <circle cx="88" cy="55" r="7" fill="#E8F4FD" opacity="0.4"/>
  <line x1="95" y1="63" x2="103" y2="72" stroke="#3498DB" stroke-width="3" stroke-linecap="round"/>
  <!-- 손으로 돋보기 잡기 -->
  <path d="M78 58 Q82 56 85 55" stroke="#FFE66D" stroke-width="4" fill="none" stroke-linecap="round"/>
