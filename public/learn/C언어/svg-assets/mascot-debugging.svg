  <circle cx="88" cy="55" r="3" fill="#E74C3C" opacity="0.7"/>
  <text x="85.5" y="58" font-size="7" fill="white" font-weight="bold">🐛</text>
  <!-- 다리 -->
  <line x1="55" y1="78" x2="52" y2="88" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="79" x2="60" y2="90" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
  <line x1="65" y1="78" x2="68" y2="88" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
