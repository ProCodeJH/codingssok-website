<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="wing-left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#FF8E8E"/>
    </linearGradient>
    <linearGradient id="wing-right" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ECDC4"/>
      <stop offset="100%" stop-color="#6EE7DE"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- 왼쪽 날개 (상) -->
  <ellipse cx="38" cy="42" rx="26" ry="20" fill="url(#wing-left)" opacity="0.9" transform="rotate(-15 38 42)"/>
  <ellipse cx="38" cy="42" rx="18" ry="13" fill="#FFB3B3" opacity="0.4" transform="rotate(-15 38 42)"/>
  <!-- 왼쪽 날개 (하) -->
  <ellipse cx="35" cy="68" rx="20" ry="15" fill="url(#wing-left)" opacity="0.8" transform="rotate(-10 35 68)"/>
  <!-- 오른쪽 날개 (상) -->
  <ellipse cx="82" cy="42" rx="26" ry="20" fill="url(#wing-right)" opacity="0.9" transform="rotate(15 82 42)"/>
  <ellipse cx="82" cy="42" rx="18" ry="13" fill="#B3F0EB" opacity="0.4" transform="rotate(15 82 42)"/>
  <!-- 오른쪽 날개 (하) -->
  <ellipse cx="85" cy="68" rx="20" ry="15" fill="url(#wing-right)" opacity="0.8" transform="rotate(10 85 68)"/>
  <!-- 몸통 -->
  <ellipse cx="60" cy="62" rx="12" ry="18" fill="#FFE66D" filter="url(#shadow)"/>
  <ellipse cx="60" cy="62" rx="9" ry="14" fill="#FFF3B0" opacity="0.5"/>
  <!-- 머리 -->
  <circle cx="60" cy="38" r="16" fill="#FFE66D" filter="url(#shadow)"/>
  <circle cx="60" cy="36" r="12" fill="#FFF3B0" opacity="0.4"/>
  <!-- 눈 -->
  <ellipse cx="53" cy="36" rx="4" ry="4.5" fill="#2C3E50"/>
  <ellipse cx="67" cy="36" rx="4" ry="4.5" fill="#2C3E50"/>
  <circle cx="51.5" cy="34.5" r="1.5" fill="white"/>
  <circle cx="65.5" cy="34.5" r="1.5" fill="white"/>
  <!-- 입 (활짝 웃음) -->
  <path d="M53 43 Q60 50 67 43" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 볼터치 -->
  <ellipse cx="47" cy="42" rx="4" ry="2.5" fill="#FFB3B3" opacity="0.6"/>
  <ellipse cx="73" cy="42" rx="4" ry="2.5" fill="#FFB3B3" opacity="0.6"/>
  <!-- 더듬이 -->
  <path d="M54 24 Q48 10 42 8" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="42" cy="8" r="3" fill="#FF6B6B"/>
  <path d="M66 24 Q72 10 78 8" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="78" cy="8" r="3" fill="#4ECDC4"/>
  <!-- 인사하는 손 (왼쪽) -->
  <path d="M38 58 Q28 52 22 45" stroke="#FFE66D" stroke-width="4" fill="none" stroke-linecap="round"/>
  <text x="14" y="42" font-size="14" transform="rotate(-20 14 42)">👋</text>
  <!-- 다리 -->
  <line x1="55" y1="78" x2="52" y2="88" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="79" x2="60" y2="90" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
  <line x1="65" y1="78" x2="68" y2="88" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
  <!-- 말풍선 힌트 -->
  <rect x="75" y="90" rx="6" ry="6" width="42" height="22" fill="white" stroke="#4ECDC4" stroke-width="1.5" opacity="0.95"/>
  <text x="82" y="105" font-family="Pretendard, sans-serif" font-size="9" font-weight="700" fill="#2C3E50">안녕!</text>
</svg>
