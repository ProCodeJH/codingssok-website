<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" font-family="Pretendard, sans-serif">
  <text x="250" y="25" text-anchor="middle" font-size="16" font-weight="800" fill="#1E293B">메모리 계층 구조 — 빠를수록 작고 비싸다!</text>
  <!-- Pyramid -->
  <polygon points="250,45 130,355 370,355" fill="none" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- Level 1: Register -->
  <rect x="215" y="52" width="70" height="32" rx="6" fill="#EF4444"/>
  <text x="250" y="73" text-anchor="middle" font-size="10" font-weight="700" fill="white">레지스터</text>
  <text x="390" y="70" text-anchor="start" font-size="8.5" fill="#7F1D1D">수 바이트 | 0.3ns | 가장 빠름!</text>
  <!-- Level 2: L1 Cache -->
  <rect x="195" y="92" width="110" height="32" rx="6" fill="#F97316"/>
  <text x="250" y="113" text-anchor="middle" font-size="10" font-weight="700" fill="white">L1 캐시</text>
  <text x="390" y="110" text-anchor="start" font-size="8.5" fill="#431407">32~64KB | 1ns</text>
  <!-- Level 3: L2 Cache -->
  <rect x="180" y="132" width="140" height="32" rx="6" fill="#F59E0B"/>
  <text x="250" y="153" text-anchor="middle" font-size="10" font-weight="700" fill="white">L2 캐시</text>
  <text x="390" y="150" text-anchor="start" font-size="8.5" fill="#78350F">256KB~1MB | 3~10ns</text>
  <!-- Level 4: L3 Cache -->
  <rect x="165" y="172" width="170" height="32" rx="6" fill="#EAB308"/>
  <text x="250" y="193" text-anchor="middle" font-size="10" font-weight="700" fill="white">L3 캐시</text>
  <text x="390" y="190" text-anchor="start" font-size="8.5" fill="#713F12">8~64MB | 10~30ns</text>
  <!-- Level 5: RAM -->
  <rect x="148" y="212" width="204" height="36" rx="6" fill="#3B82F6"/>
  <text x="250" y="235" text-anchor="middle" font-size="11" font-weight="700" fill="white">RAM (주기억장치)</text>
  <text x="390" y="232" text-anchor="start" font-size="8.5" fill="#1E3A5F">8~64GB | 50~100ns</text>
  <!-- Level 6: SSD -->
  <rect x="138" y="256" width="224" height="36" rx="6" fill="#8B5CF6"/>
  <text x="250" y="279" text-anchor="middle" font-size="11" font-weight="700" fill="white">SSD (보조기억장치)</text>
  <text x="390" y="278" text-anchor="start" font-size="8.5" fill="#3B0764">256GB~4TB | 25~100μs</text>
  <!-- Level 7: HDD -->
  <rect x="132" y="300" width="236" height="36" rx="6" fill="#6366F1"/>
  <text x="250" y="323" text-anchor="middle" font-size="11" font-weight="700" fill="white">HDD (하드디스크)</text>
  <text x="390" y="320" text-anchor="start" font-size="8.5" fill="#312E81">1~20TB | 3~10ms | 가장 느림</text>
  <!-- Arrows -->
  <text x="105" y="120" text-anchor="end" font-size="10" fill="#EF4444" font-weight="700">빠름 ↑</text>
  <text x="105" y="140" text-anchor="end" font-size="9" fill="#EF4444">작음</text>
  <text x="105" y="155" text-anchor="end" font-size="9" fill="#EF4444">비쌈</text>
  <text x="105" y="280" text-anchor="end" font-size="10" fill="#6366F1" font-weight="700">느림 ↓</text>
  <text x="105" y="300" text-anchor="end" font-size="9" fill="#6366F1">큼</text>
  <text x="105" y="315" text-anchor="end" font-size="9" fill="#6366F1">저렴</text>
  <!-- Speed comparison -->
  <rect x="132" y="348" width="236" height="22" rx="6" fill="#F1F5F9"/>
  <text x="250" y="363" text-anchor="middle" font-size="9" fill="#64748B">레지스터 vs HDD 속도 차이: 약 100만 배!</text>
</svg>
