<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" font-family="Pretendard, sans-serif">
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="800" fill="#1E293B">10→2 변환: 나누기 2 반복 | 2→10 변환: 자릿값 더하기</text>
  <!-- 10→2: divide by 2 -->
  <rect x="15" y="38" width="225" height="230" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="127" y="58" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">10진수 13 → 2진수</text>
  <g font-size="9.5" fill="#1E293B">
    <text x="30" y="80">13 ÷ 2 = 6 ... 나머지 <tspan font-weight="800" fill="#DC2626">1</tspan></text>
    <text x="30" y="100">  6 ÷ 2 = 3 ... 나머지 <tspan font-weight="800" fill="#DC2626">0</tspan></text>
    <text x="30" y="120">  3 ÷ 2 = 1 ... 나머지 <tspan font-weight="800" fill="#DC2626">1</tspan></text>
    <text x="30" y="140">  1 ÷ 2 = 0 ... 나머지 <tspan font-weight="800" fill="#DC2626">1</tspan></text>
  </g>
  <line x1="195" y1="70" x2="195" y2="148" stroke="#DC2626" stroke-width="1.5"/>
  <text x="205" y="78" font-size="8" fill="#DC2626">맨 아래↑</text>
  <text x="205" y="148" font-size="8" fill="#DC2626">맨 위</text>
  <path d="M195 148 L215 120" stroke="#DC2626" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="40" y="155" width="170" height="30" rx="6" fill="#3B82F6"/>
  <text x="125" y="175" text-anchor="middle" font-size="11" font-weight="700" fill="white">나머지 역순: 1101₂</text>
  <text x="127" y="205" text-anchor="middle" font-size="9" fill="#475569">검증: 8+4+0+1 = 13 ✓</text>
  <text x="127" y="225" text-anchor="middle" font-size="8.5" fill="#64748B">나누기2 → 나머지적기 → 역순읽기</text>
  <text x="127" y="255" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">이것이 알고리즘이에요!</text>
  <!-- 2→10: add place values -->
  <rect x="260" y="38" width="225" height="230" rx="12" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.2"/>
  <text x="372" y="58" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">2진수 1010₂ → 10진수</text>
  <g text-anchor="middle" font-size="10">
    <text x="290" y="82" fill="#64748B">8</text><text x="330" y="82" fill="#64748B">4</text><text x="370" y="82" fill="#64748B">2</text><text x="410" y="82" fill="#64748B">1</text>
    <text x="290" y="105" font-size="18" font-weight="900" fill="#DC2626">1</text><text x="330" y="105" font-size="18" font-weight="900" fill="#DC2626">0</text><text x="370" y="105" font-size="18" font-weight="900" fill="#DC2626">1</text><text x="410" y="105" font-size="18" font-weight="900" fill="#DC2626">0</text>
    <text x="290" y="125" fill="#059669">8✓</text><text x="330" y="125" fill="#94A3B8">×</text><text x="370" y="125" fill="#059669">2✓</text><text x="410" y="125" fill="#94A3B8">×</text>
  </g>
  <text x="372" y="148" text-anchor="middle" font-size="9" fill="#475569">1이 있는 자리만 골라요</text>
  <rect x="285" y="155" width="170" height="30" rx="6" fill="#EF4444"/>
  <text x="370" y="175" text-anchor="middle" font-size="11" font-weight="700" fill="white">8 + 2 = 10</text>
  <text x="372" y="205" text-anchor="middle" font-size="9" fill="#475569">0인 자리는 무시!</text>
  <text x="372" y="225" text-anchor="middle" font-size="8.5" fill="#64748B">자릿값 배정 → 1인곳만 더하기</text>
  <text x="372" y="255" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">정말 간단해요!</text>
</svg>
