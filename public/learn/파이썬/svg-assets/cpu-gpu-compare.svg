<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 260" font-family="Pretendard, sans-serif">
  <text x="250" y="25" text-anchor="middle" font-size="16" font-weight="800" fill="#1E293B">CPU vs GPU — 어떻게 다를까?</text>
  <!-- CPU side -->
  <rect x="20" y="45" width="210" height="195" rx="14" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="125" y="72" text-anchor="middle" font-size="14" font-weight="800" fill="#1D4ED8">CPU</text>
  <text x="125" y="90" text-anchor="middle" font-size="9" fill="#1E3A5F">Central Processing Unit</text>
  <line x1="40" y1="98" x2="210" y2="98" stroke="#BFDBFE"/>
  <!-- CPU cores (few big ones) -->
  <rect x="40" y="108" width="40" height="40" rx="8" fill="#3B82F6"/>
  <text x="60" y="133" text-anchor="middle" font-size="8" font-weight="700" fill="white">코어1</text>
  <rect x="88" y="108" width="40" height="40" rx="8" fill="#3B82F6"/>
  <text x="108" y="133" text-anchor="middle" font-size="8" font-weight="700" fill="white">코어2</text>
  <rect x="136" y="108" width="40" height="40" rx="8" fill="#3B82F6"/>
  <text x="156" y="133" text-anchor="middle" font-size="8" font-weight="700" fill="white">코어3</text>
  <rect x="184" y="108" width="40" height="40" rx="8" fill="#3B82F6"/>
  <text x="204" y="133" text-anchor="middle" font-size="8" font-weight="700" fill="white">코어4</text>
  <text x="125" y="168" text-anchor="middle" font-size="9.5" fill="#1E3A5F" font-weight="600">코어 4~24개 (강력)</text>
  <text x="125" y="185" text-anchor="middle" font-size="8.5" fill="#64748B">🧠 수학 천재 교수 4명</text>
  <text x="125" y="200" text-anchor="middle" font-size="8.5" fill="#64748B">어려운 문제를 순서대로</text>
  <text x="125" y="215" text-anchor="middle" font-size="8.5" fill="#64748B">→ 운영체제, 앱, 게임 로직</text>
  <text x="125" y="230" text-anchor="middle" font-size="9" fill="#1D4ED8" font-weight="600">직렬 처리에 강함!</text>
  <!-- VS -->
  <text x="250" y="155" text-anchor="middle" font-size="18" font-weight="900" fill="#FF6B6B">VS</text>
  <!-- GPU side -->
  <rect x="270" y="45" width="210" height="195" rx="14" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="375" y="72" text-anchor="middle" font-size="14" font-weight="800" fill="#059669">GPU</text>
  <text x="375" y="90" text-anchor="middle" font-size="9" fill="#14532D">Graphics Processing Unit</text>
  <line x1="290" y1="98" x2="460" y2="98" stroke="#A7F3D0"/>
  <!-- GPU cores (many small ones) -->
  <g fill="#10B981">
    <rect x="285" y="106" width="12" height="12" rx="2"/><rect x="300" y="106" width="12" height="12" rx="2"/>
    <rect x="315" y="106" width="12" height="12" rx="2"/><rect x="330" y="106" width="12" height="12" rx="2"/>
    <rect x="345" y="106" width="12" height="12" rx="2"/><rect x="360" y="106" width="12" height="12" rx="2"/>
    <rect x="375" y="106" width="12" height="12" rx="2"/><rect x="390" y="106" width="12" height="12" rx="2"/>
    <rect x="405" y="106" width="12" height="12" rx="2"/><rect x="420" y="106" width="12" height="12" rx="2"/>
    <rect x="435" y="106" width="12" height="12" rx="2"/><rect x="450" y="106" width="12" height="12" rx="2"/>
    <rect x="285" y="121" width="12" height="12" rx="2"/><rect x="300" y="121" width="12" height="12" rx="2"/>
    <rect x="315" y="121" width="12" height="12" rx="2"/><rect x="330" y="121" width="12" height="12" rx="2"/>
    <rect x="345" y="121" width="12" height="12" rx="2"/><rect x="360" y="121" width="12" height="12" rx="2"/>
    <rect x="375" y="121" width="12" height="12" rx="2"/><rect x="390" y="121" width="12" height="12" rx="2"/>
    <rect x="405" y="121" width="12" height="12" rx="2"/><rect x="420" y="121" width="12" height="12" rx="2"/>
    <rect x="435" y="121" width="12" height="12" rx="2"/><rect x="450" y="121" width="12" height="12" rx="2"/>
    <rect x="285" y="136" width="12" height="12" rx="2"/><rect x="300" y="136" width="12" height="12" rx="2"/>
    <rect x="315" y="136" width="12" height="12" rx="2"/><rect x="330" y="136" width="12" height="12" rx="2"/>
    <rect x="345" y="136" width="12" height="12" rx="2"/><rect x="360" y="136" width="12" height="12" rx="2"/>
    <rect x="375" y="136" width="12" height="12" rx="2"/><rect x="390" y="136" width="12" height="12" rx="2"/>
    <rect x="405" y="136" width="12" height="12" rx="2"/><rect x="420" y="136" width="12" height="12" rx="2"/>
    <rect x="435" y="136" width="12" height="12" rx="2"/><rect x="450" y="136" width="12" height="12" rx="2"/>
  </g>
  <text x="375" y="168" text-anchor="middle" font-size="9.5" fill="#14532D" font-weight="600">코어 수천~수만 개 (단순)</text>
  <text x="375" y="185" text-anchor="middle" font-size="8.5" fill="#64748B">👦 초등학생 1만 명</text>
  <text x="375" y="200" text-anchor="middle" font-size="8.5" fill="#64748B">쉬운 구구단을 동시에</text>
  <text x="375" y="215" text-anchor="middle" font-size="8.5" fill="#64748B">→ 3D게임, AI학습, 영상처리</text>
  <text x="375" y="230" text-anchor="middle" font-size="9" fill="#059669" font-weight="600">병렬 처리에 강함!</text>
</svg>
