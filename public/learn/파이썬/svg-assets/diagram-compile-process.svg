<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <style>
    text { font-family: 'Pretendard', sans-serif; }
    .label { font-size: 11px; fill: #7F8C8D; }
    .block-text { font-size: 13px; fill: white; font-weight: 700; }
    .arrow-text { font-size: 10px; fill: #95A5A6; }
  </style>
  <!-- Step 1: 소스코드 -->
  <rect x="10" y="30" rx="10" ry="10" width="120" height="70" fill="#2C3E50"/>
  <text x="70" y="60" text-anchor="middle" class="block-text">hello.c</text>
  <text x="70" y="78" text-anchor="middle" font-size="10" fill="#BDC3C7" font-family="JetBrains Mono, monospace">printf("Hello")</text>
  <text x="70" y="118" text-anchor="middle" class="label">① 코드 작성</text>
  <text x="70" y="132" text-anchor="middle" font-size="10" fill="#BDC3C7">사람이 읽는 글</text>
  <!-- Arrow 1 -->
  <path d="M135 65 L175 65" stroke="#FF6B6B" stroke-width="2.5" fill="none" marker-end="url(#arrowRed)"/>
  <text x="155" y="55" text-anchor="middle" class="arrow-text">gcc</text>
  <!-- Step 2: 컴파일러 -->
  <rect x="180" y="25" rx="10" ry="10" width="120" height="80" fill="#FF6B6B"/>
  <rect x="188" y="33" rx="6" ry="6" width="104" height="64" fill="#FF8E8E" opacity="0.3"/>
  <text x="240" y="55" text-anchor="middle" class="block-text">컴파일러</text>
  <text x="240" y="72" text-anchor="middle" font-size="10" fill="white" opacity="0.9">(gcc)</text>
  <text x="240" y="87" text-anchor="middle" font-size="9" fill="white" opacity="0.7">번역기 역할!</text>
  <text x="240" y="118" text-anchor="middle" class="label">② 컴파일</text>
  <text x="240" y="132" text-anchor="middle" font-size="10" fill="#BDC3C7">기계어로 번역</text>
  <!-- Arrow 2 -->
  <path d="M305 65 L345 65" stroke="#4ECDC4" stroke-width="2.5" fill="none" marker-end="url(#arrowTeal)"/>
  <text x="325" y="55" text-anchor="middle" class="arrow-text">0과 1</text>
  <!-- Step 3: 실행파일 -->
  <rect x="350" y="30" rx="10" ry="10" width="120" height="70" fill="#4ECDC4"/>
  <text x="410" y="58" text-anchor="middle" class="block-text">hello.exe</text>
  <text x="410" y="76" text-anchor="middle" font-size="10" fill="white" opacity="0.9">실행 파일</text>
  <text x="410" y="118" text-anchor="middle" class="label">③ 실행</text>
  <text x="410" y="132" text-anchor="middle" font-size="10" fill="#BDC3C7">CPU가 실행</text>
  <!-- Arrow 3 -->
  <path d="M475 65 L510 65" stroke="#FFD93D" stroke-width="2.5" fill="none" marker-end="url(#arrowYellow)"/>
  <!-- Step 4: 출력 -->
  <rect x="515" y="25" rx="10" ry="10" width="80" height="80" fill="#FFD93D"/>
  <text x="555" y="55" text-anchor="middle" font-size="12" fill="#2C3E50" font-weight="700" font-family="Pretendard, sans-serif">모니터</text>
  <rect x="530" y="63" rx="4" ry="4" width="50" height="28" fill="white" opacity="0.8"/>
  <text x="555" y="82" text-anchor="middle" font-size="9" fill="#2C3E50" font-family="JetBrains Mono, monospace" font-weight="600">Hello!</text>
  <text x="555" y="118" text-anchor="middle" class="label">④ 출력</text>
  <text x="555" y="132" text-anchor="middle" font-size="10" fill="#BDC3C7">결과가 보여요</text>
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#FF6B6B"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#4ECDC4"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#FFD93D"/>
    </marker>
  </defs>
  <!-- 타이틀 -->
  <text x="300" y="155" text-anchor="middle" font-size="12" fill="#2C3E50" font-weight="600" font-family="Pretendard, sans-serif">코드가 실행되는 과정</text>
</svg>
