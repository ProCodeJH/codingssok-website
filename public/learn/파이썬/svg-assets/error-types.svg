<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" font-family="Pretendard, sans-serif">
  <text x="300" y="28" text-anchor="middle" font-size="18" font-weight="800" fill="#1E293B">프로그래밍 에러 3분류</text>
  <!-- Compile Error -->
  <rect x="15" y="50" width="180" height="210" rx="14" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <rect x="15" y="50" width="180" height="40" rx="14" fill="#EF4444"/>
  <rect x="15" y="76" width="180" height="14" fill="#EF4444"/>
  <text x="105" y="76" text-anchor="middle" font-size="14" font-weight="800" fill="white">① 컴파일 에러</text>
  <text x="105" y="112" text-anchor="middle" font-size="11" fill="#7F1D1D" font-weight="600">코드 문법이 틀림</text>
  <text x="105" y="132" text-anchor="middle" font-size="10" fill="#991B1B">→ 실행 자체가 안 됨!</text>
  <line x1="35" y1="145" x2="175" y2="145" stroke="#FECACA" stroke-width="1"/>
  <text x="30" y="165" font-size="9.5" fill="#7F1D1D">• 세미콜론(;) 빠뜨림</text>
  <text x="30" y="182" font-size="9.5" fill="#7F1D1D">• 괄호 짝 안 맞음</text>
  <text x="30" y="199" font-size="9.5" fill="#7F1D1D">• printf를 print로 씀</text>
  <text x="30" y="216" font-size="9.5" fill="#7F1D1D">• 변수 선언 안 한 채 사용</text>
  <rect x="35" y="228" width="150" height="22" rx="6" fill="#FEE2E2"/>
  <text x="110" y="243" text-anchor="middle" font-size="9" fill="#DC2626" font-weight="700">찾기 쉬움 — 컴파일러가 알려줌</text>
  <!-- Runtime Error -->
  <rect x="210" y="50" width="180" height="210" rx="14" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <rect x="210" y="50" width="180" height="40" rx="14" fill="#F59E0B"/>
  <rect x="210" y="76" width="180" height="14" fill="#F59E0B"/>
  <text x="300" y="76" text-anchor="middle" font-size="14" font-weight="800" fill="white">② 런타임 에러</text>
  <text x="300" y="112" text-anchor="middle" font-size="11" fill="#78350F" font-weight="600">실행 중에 멈춤</text>
  <text x="300" y="132" text-anchor="middle" font-size="10" fill="#92400E">→ 프로그램이 비정상 종료!</text>
  <line x1="230" y1="145" x2="370" y2="145" stroke="#FDE68A" stroke-width="1"/>
  <text x="225" y="165" font-size="9.5" fill="#78350F">• 0으로 나누기</text>
  <text x="225" y="182" font-size="9.5" fill="#78350F">• 메모리 부족 (오버플로)</text>
  <text x="225" y="199" font-size="9.5" fill="#78350F">• 배열 범위 초과</text>
  <text x="225" y="216" font-size="9.5" fill="#78350F">• 무한 재귀</text>
  <rect x="230" y="228" width="150" height="22" rx="6" fill="#FEF3C7"/>
  <text x="305" y="243" text-anchor="middle" font-size="9" fill="#D97706" font-weight="700">중간 난이도 — 실행해봐야 발견</text>
  <!-- Logic Error -->
  <rect x="405" y="50" width="180" height="210" rx="14" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
  <rect x="405" y="50" width="180" height="40" rx="14" fill="#8B5CF6"/>
  <rect x="405" y="76" width="180" height="14" fill="#8B5CF6"/>
  <text x="495" y="76" text-anchor="middle" font-size="14" font-weight="800" fill="white">③ 논리 에러</text>
  <text x="495" y="112" text-anchor="middle" font-size="11" fill="#3B0764" font-weight="600">실행은 되지만 결과가 틀림</text>
  <text x="495" y="132" text-anchor="middle" font-size="10" fill="#4C1D95">→ 가장 찾기 어려운 에러!</text>
  <line x1="425" y1="145" x2="565" y2="145" stroke="#C4B5FD" stroke-width="1"/>
  <text x="420" y="165" font-size="9.5" fill="#3B0764">• 조건식 잘못 작성</text>
  <text x="420" y="182" font-size="9.5" fill="#3B0764">• 반복 횟수 1 차이</text>
  <text x="420" y="199" font-size="9.5" fill="#3B0764">• 변수 초기값 실수</text>
  <text x="420" y="216" font-size="9.5" fill="#3B0764">• 알고리즘 자체가 잘못됨</text>
  <rect x="425" y="228" width="150" height="22" rx="6" fill="#EDE9FE"/>
  <text x="500" y="243" text-anchor="middle" font-size="9" fill="#7C3AED" font-weight="700">가장 어려움 — 직접 찾아야 함</text>
</svg>
