<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" font-family="Pretendard, sans-serif">
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="800" fill="#1E293B">손가락 2진수 — 한 손으로 0~31까지!</text>
  <!-- Hand outline -->
  <rect x="30" y="38" width="280" height="150" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1"/>
  <!-- Fingers -->
  <g text-anchor="middle" font-size="9">
    <!-- Pinky = 16 -->
    <rect x="45" y="55" width="38" height="55" rx="16" fill="#EF4444"/>
    <text x="64" y="78" fill="white" font-weight="700">새끼</text>
    <text x="64" y="92" fill="white" font-size="11" font-weight="900">16</text>
    <text x="64" y="120" fill="#7F1D1D" font-size="7">2⁴</text>
    <!-- Ring = 8 -->
    <rect x="92" y="48" width="38" height="62" rx="16" fill="#F97316"/>
    <text x="111" y="71" fill="white" font-weight="700">약지</text>
    <text x="111" y="88" fill="white" font-size="11" font-weight="900">8</text>
    <text x="111" y="120" fill="#431407" font-size="7">2³</text>
    <!-- Middle = 4 -->
    <rect x="139" y="44" width="38" height="66" rx="16" fill="#EAB308"/>
    <text x="158" y="67" fill="white" font-weight="700">중지</text>
    <text x="158" y="84" fill="white" font-size="11" font-weight="900">4</text>
    <text x="158" y="120" fill="#713F12" font-size="7">2²</text>
    <!-- Index = 2 -->
    <rect x="186" y="48" width="38" height="62" rx="16" fill="#3B82F6"/>
    <text x="205" y="71" fill="white" font-weight="700">검지</text>
    <text x="205" y="88" fill="white" font-size="11" font-weight="900">2</text>
    <text x="205" y="120" fill="#1E3A5F" font-size="7">2¹</text>
    <!-- Thumb = 1 -->
    <rect x="233" y="65" width="38" height="50" rx="16" fill="#10B981"/>
    <text x="252" y="85" fill="white" font-weight="700">엄지</text>
    <text x="252" y="100" fill="white" font-size="11" font-weight="900">1</text>
    <text x="252" y="120" fill="#14532D" font-size="7">2⁰</text>
  </g>
  <!-- Palm -->
  <rect x="55" y="115" width="216" height="55" rx="12" fill="#FEF3C7"/>
  <text x="163" y="140" text-anchor="middle" font-size="10" font-weight="600" fill="#78350F">펴면 = 1 | 접으면 = 0</text>
  <text x="163" y="158" text-anchor="middle" font-size="9" fill="#78350F">예: 19 = 10011 → 새끼+검지+엄지</text>
  <!-- Examples -->
  <rect x="330" y="45" width="155" height="140" rx="10" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="407" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#1E293B">연습해 보세요!</text>
  <text x="340" y="88" font-size="8.5" fill="#475569">7 = 엄지+검지+중지</text>
  <text x="340" y="104" font-size="8.5" fill="#475569">10 = 검지+약지</text>
  <text x="340" y="120" font-size="8.5" fill="#475569">21 = 엄지+중지+새끼</text>
  <text x="340" y="136" font-size="8.5" fill="#475569">31 = 다섯 손가락 전부!</text>
  <text x="340" y="156" font-size="8.5" fill="#475569">두 손 = 0~1023! 🤯</text>
  <text x="340" y="175" font-size="7.5" fill="#94A3B8">5비트=32가지 | 10비트=1024가지</text>
</svg>
