<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" font-family="Pretendard, sans-serif">
  <text x="280" y="22" text-anchor="middle" font-size="15" font-weight="800" fill="#1E293B">파이프라인 = 세탁소 비유</text>
  <!-- Without pipeline -->
  <rect x="10" y="35" width="260" height="115" rx="10" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.2"/>
  <text x="140" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">❌ 파이프라인 없이 (순차 처리)</text>
  <g font-size="8" fill="#64748B">
    <text x="25" y="72">시간1</text><text x="25" y="86">시간2</text><text x="25" y="100">시간3</text><text x="25" y="114">시간4</text><text x="25" y="128">시간5</text><text x="25" y="142">시간6</text>
  </g>
  <!-- Row 1: 빨래1 all 4 steps -->
  <rect x="60" y="63" width="48" height="13" rx="3" fill="#3B82F6"/><text x="84" y="73" text-anchor="middle" font-size="7" fill="white">세탁</text>
  <rect x="60" y="77" width="48" height="13" rx="3" fill="#10B981"/><text x="84" y="87" text-anchor="middle" font-size="7" fill="white">건조</text>
  <rect x="60" y="91" width="48" height="13" rx="3" fill="#F59E0B"/><text x="84" y="101" text-anchor="middle" font-size="7" fill="white">다림질</text>
  <rect x="60" y="105" width="48" height="13" rx="3" fill="#8B5CF6"/><text x="84" y="115" text-anchor="middle" font-size="7" fill="white">포장</text>
  <!-- Row 2: 빨래2 starts at time 5 -->
  <rect x="60" y="119" width="48" height="13" rx="3" fill="#3B82F6" opacity="0.5"/><text x="84" y="129" text-anchor="middle" font-size="7" fill="white">세탁</text>
  <rect x="60" y="133" width="48" height="13" rx="3" fill="#10B981" opacity="0.5"/><text x="84" y="143" text-anchor="middle" font-size="7" fill="white">건조</text>
  <text x="140" y="142" text-anchor="middle" font-size="9" fill="#DC2626" font-weight="600">빨래 2개 → 8시간!</text>

  <!-- With pipeline -->
  <rect x="290" y="35" width="260" height="115" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.2"/>
  <text x="420" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">✅ 파이프라인 있으면 (겹쳐 처리)</text>
  <g font-size="8" fill="#64748B">
    <text x="305" y="72">시간1</text><text x="305" y="86">시간2</text><text x="305" y="100">시간3</text><text x="305" y="114">시간4</text><text x="305" y="128">시간5</text>
  </g>
  <!-- Pipelined: staggered -->
  <rect x="340" y="63" width="44" height="13" rx="3" fill="#3B82F6"/><text x="362" y="73" text-anchor="middle" font-size="7" fill="white">세탁1</text>
  <rect x="340" y="77" width="44" height="13" rx="3" fill="#10B981"/><text x="362" y="87" text-anchor="middle" font-size="7" fill="white">건조1</text>
  <rect x="388" y="77" width="44" height="13" rx="3" fill="#3B82F6"/><text x="410" y="87" text-anchor="middle" font-size="7" fill="white">세탁2</text>
  <rect x="340" y="91" width="44" height="13" rx="3" fill="#F59E0B"/><text x="362" y="101" text-anchor="middle" font-size="7" fill="white">다림1</text>
  <rect x="388" y="91" width="44" height="13" rx="3" fill="#10B981"/><text x="410" y="101" text-anchor="middle" font-size="7" fill="white">건조2</text>
  <rect x="436" y="91" width="44" height="13" rx="3" fill="#3B82F6"/><text x="458" y="101" text-anchor="middle" font-size="7" fill="white">세탁3</text>
  <rect x="340" y="105" width="44" height="13" rx="3" fill="#8B5CF6"/><text x="362" y="115" text-anchor="middle" font-size="7" fill="white">포장1</text>
  <rect x="388" y="105" width="44" height="13" rx="3" fill="#F59E0B"/><text x="410" y="115" text-anchor="middle" font-size="7" fill="white">다림2</text>
  <rect x="436" y="105" width="44" height="13" rx="3" fill="#10B981"/><text x="458" y="115" text-anchor="middle" font-size="7" fill="white">건조3</text>
  <rect x="388" y="119" width="44" height="13" rx="3" fill="#8B5CF6"/><text x="410" y="129" text-anchor="middle" font-size="7" fill="white">포장2</text>
  <rect x="436" y="119" width="44" height="13" rx="3" fill="#F59E0B"/><text x="458" y="129" text-anchor="middle" font-size="7" fill="white">다림3</text>
  <text x="420" y="142" text-anchor="middle" font-size="9" fill="#059669" font-weight="600">빨래 3개 → 6시간!</text>

  <!-- Bottom comparison -->
  <rect x="10" y="165" width="540" height="105" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="280" y="185" text-anchor="middle" font-size="12" font-weight="700" fill="#1E293B">CPU 파이프라인도 똑같아요!</text>
  <text x="280" y="205" text-anchor="middle" font-size="10" fill="#475569">세탁 = IF(명령어 가져오기) | 건조 = ID(해석) | 다림질 = EX(실행) | 포장 = WB(저장)</text>
  <text x="280" y="225" text-anchor="middle" font-size="10" fill="#475569">각 단계가 끝나면 바로 다음 명령어가 그 단계에 들어감!</text>
  <text x="280" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">결과: 매 클럭마다 명령어 1개 완성 → 최대 5배 빨라짐!</text>
  <text x="280" y="265" text-anchor="middle" font-size="9" fill="#94A3B8">* 해저드(데이터/제어/구조적)가 발생하면 일시적으로 느려질 수 있어요</text>
</svg>
