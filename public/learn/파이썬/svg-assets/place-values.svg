<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 240" font-family="Pretendard, sans-serif">
  <text x="260" y="22" text-anchor="middle" font-size="15" font-weight="800" fill="#1E293B">10진수 vs 2진수 자릿값 비교</text>
  <!-- 10진수 -->
  <rect x="15" y="38" width="240" height="90" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="135" y="58" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">10진수 (우리가 쓰는 수)</text>
  <g text-anchor="middle" font-size="9">
    <text x="45" y="78" fill="#64748B">천의자리</text><text x="95" y="78" fill="#64748B">백의자리</text><text x="145" y="78" fill="#64748B">십의자리</text><text x="195" y="78" fill="#64748B">일의자리</text>
    <text x="45" y="95" font-size="14" font-weight="800" fill="#1D4ED8">3</text><text x="95" y="95" font-size="14" font-weight="800" fill="#1D4ED8">7</text><text x="145" y="95" font-size="14" font-weight="800" fill="#1D4ED8">2</text><text x="195" y="95" font-size="14" font-weight="800" fill="#1D4ED8">5</text>
    <text x="45" y="112" fill="#3B82F6">×1000</text><text x="95" y="112" fill="#3B82F6">×100</text><text x="145" y="112" fill="#3B82F6">×10</text><text x="195" y="112" fill="#3B82F6">×1</text>
    <text x="135" y="126" font-size="8" fill="#64748B">= 3000+700+20+5 = 3725</text>
  </g>
  <!-- 2진수 -->
  <rect x="265" y="38" width="240" height="90" rx="12" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.2"/>
  <text x="385" y="58" text-anchor="middle" font-size="12" font-weight="700" fill="#DC2626">2진수 (컴퓨터가 쓰는 수)</text>
  <g text-anchor="middle" font-size="9">
    <text x="295" y="78" fill="#64748B">8의자리</text><text x="345" y="78" fill="#64748B">4의자리</text><text x="395" y="78" fill="#64748B">2의자리</text><text x="445" y="78" fill="#64748B">1의자리</text>
    <text x="295" y="95" font-size="14" font-weight="800" fill="#DC2626">1</text><text x="345" y="95" font-size="14" font-weight="800" fill="#DC2626">1</text><text x="395" y="95" font-size="14" font-weight="800" fill="#DC2626">0</text><text x="445" y="95" font-size="14" font-weight="800" fill="#DC2626">1</text>
    <text x="295" y="112" fill="#EF4444">×8</text><text x="345" y="112" fill="#EF4444">×4</text><text x="395" y="112" fill="#EF4444">×2</text><text x="445" y="112" fill="#EF4444">×1</text>
    <text x="385" y="126" font-size="8" fill="#64748B">= 8+4+0+1 = 13</text>
  </g>
  <!-- Comparison -->
  <rect x="50" y="142" width="420" height="85" rx="10" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="260" y="164" text-anchor="middle" font-size="11" font-weight="700" fill="#1E293B">핵심 차이</text>
  <text x="260" y="184" text-anchor="middle" font-size="10" fill="#475569">10진수: 자릿값이 ×10씩 커짐 → 1, 10, 100, 1000...</text>
  <text x="260" y="200" text-anchor="middle" font-size="10" fill="#475569">2진수: 자릿값이 ×2씩 커짐 → 1, 2, 4, 8, 16, 32...</text>
  <text x="260" y="220" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">원리는 같아요! 진법(base)이 다를 뿐!</text>
</svg>
