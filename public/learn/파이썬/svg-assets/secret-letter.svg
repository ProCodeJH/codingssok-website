<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Pretendard, sans-serif">
  <text x="240" y="22" text-anchor="middle" font-size="14" font-weight="800" fill="#1E293B">비밀 편지: HELLO → 숫자 암호!</text>
  <!-- Letters -->
  <g text-anchor="middle">
    <rect x="30" y="38" width="65" height="50" rx="8" fill="#EFF6FF" stroke="#3B82F6"/>
    <text x="62" y="60" font-size="22" font-weight="900" fill="#1D4ED8">H</text>
    <text x="62" y="80" font-size="10" fill="#64748B">72</text>
    <rect x="110" y="38" width="65" height="50" rx="8" fill="#ECFDF5" stroke="#10B981"/>
    <text x="142" y="60" font-size="22" font-weight="900" fill="#059669">E</text>
    <text x="142" y="80" font-size="10" fill="#64748B">69</text>
    <rect x="190" y="38" width="65" height="50" rx="8" fill="#FEF2F2" stroke="#EF4444"/>
    <text x="222" y="60" font-size="22" font-weight="900" fill="#DC2626">L</text>
    <text x="222" y="80" font-size="10" fill="#64748B">76</text>
    <rect x="270" y="38" width="65" height="50" rx="8" fill="#FFFBEB" stroke="#F59E0B"/>
    <text x="302" y="60" font-size="22" font-weight="900" fill="#D97706">L</text>
    <text x="302" y="80" font-size="10" fill="#64748B">76</text>
    <rect x="350" y="38" width="65" height="50" rx="8" fill="#F5F3FF" stroke="#8B5CF6"/>
    <text x="382" y="60" font-size="22" font-weight="900" fill="#7C3AED">O</text>
    <text x="382" y="80" font-size="10" fill="#64748B">79</text>
  </g>
  <!-- Arrow -->
  <text x="240" y="110" text-anchor="middle" font-size="12" fill="#6B7280">↓ ASCII 변환 ↓</text>
  <!-- Secret message -->
  <rect x="60" y="120" width="360" height="45" rx="10" fill="#1E293B"/>
  <text x="240" y="145" text-anchor="middle" font-size="16" font-weight="900" fill="#10B981" letter-spacing="6">72 69 76 76 79</text>
  <text x="240" y="160" text-anchor="middle" font-size="8" fill="#94A3B8">이 숫자를 받은 친구는 ASCII 표로 해독!</text>
</svg>
