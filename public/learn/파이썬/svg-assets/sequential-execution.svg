<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 360" font-family="Pretendard, sans-serif">
  <text x="250" y="28" text-anchor="middle" font-size="18" font-weight="800" fill="#1E293B">순차 구조 — 코드는 위에서 아래로!</text>
  <!-- Left: Recipe -->
  <text x="125" y="58" text-anchor="middle" font-size="13" font-weight="700" fill="#EA580C">🍜 라면 레시피</text>
  <rect x="30" y="70" width="190" height="36" rx="8" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="125" y="93" text-anchor="middle" font-size="11" fill="#431407">1. 물 500ml 넣기</text>
  <text x="125" y="120" text-anchor="middle" font-size="14" fill="#F59E0B">↓</text>
  <rect x="30" y="130" width="190" height="36" rx="8" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="125" y="153" text-anchor="middle" font-size="11" fill="#431407">2. 불 켜기</text>
  <text x="125" y="180" text-anchor="middle" font-size="14" fill="#F59E0B">↓</text>
  <rect x="30" y="190" width="190" height="36" rx="8" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="125" y="213" text-anchor="middle" font-size="11" fill="#431407">3. 면 넣기</text>
  <text x="125" y="240" text-anchor="middle" font-size="14" fill="#F59E0B">↓</text>
  <rect x="30" y="250" width="190" height="36" rx="8" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="125" y="273" text-anchor="middle" font-size="11" fill="#431407">4. 3분 기다리기</text>
  <text x="125" y="300" text-anchor="middle" font-size="14" fill="#F59E0B">↓</text>
  <rect x="30" y="310" width="190" height="36" rx="8" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="125" y="333" text-anchor="middle" font-size="11" fill="#431407">5. 스프 넣기</text>
  <!-- Equals -->
  <text x="250" y="210" text-anchor="middle" font-size="24" font-weight="900" fill="#FF6B6B">=</text>
  <!-- Right: Code -->
  <text x="375" y="58" text-anchor="middle" font-size="13" font-weight="700" fill="#3B82F6">💻 C 코드</text>
  <rect x="280" y="70" width="190" height="36" rx="8" fill="#0F172A"/>
  <text x="375" y="93" text-anchor="middle" font-size="10" fill="#E2E8F0" font-family="JetBrains Mono, monospace">printf("물 넣기");</text>
  <text x="375" y="120" text-anchor="middle" font-size="14" fill="#3B82F6">↓</text>
  <rect x="280" y="130" width="190" height="36" rx="8" fill="#0F172A"/>
  <text x="375" y="153" text-anchor="middle" font-size="10" fill="#E2E8F0" font-family="JetBrains Mono, monospace">printf("불 켜기");</text>
  <text x="375" y="180" text-anchor="middle" font-size="14" fill="#3B82F6">↓</text>
  <rect x="280" y="190" width="190" height="36" rx="8" fill="#0F172A"/>
  <text x="375" y="213" text-anchor="middle" font-size="10" fill="#E2E8F0" font-family="JetBrains Mono, monospace">printf("면 넣기");</text>
  <text x="375" y="240" text-anchor="middle" font-size="14" fill="#3B82F6">↓</text>
  <rect x="280" y="250" width="190" height="36" rx="8" fill="#0F172A"/>
  <text x="375" y="273" text-anchor="middle" font-size="10" fill="#E2E8F0" font-family="JetBrains Mono, monospace">printf("3분 기다리기");</text>
  <text x="375" y="300" text-anchor="middle" font-size="14" fill="#3B82F6">↓</text>
  <rect x="280" y="310" width="190" height="36" rx="8" fill="#0F172A"/>
  <text x="375" y="333" text-anchor="middle" font-size="10" fill="#E2E8F0" font-family="JetBrains Mono, monospace">printf("스프 넣기");</text>
</svg>
